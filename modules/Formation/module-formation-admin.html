<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss://*.supabase.co blob:;">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S@FE — Formation DDA · Espace formateur</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js" integrity="sha384-JWEyvHh+lRf0sN/WWY+QTQwX+CyWqmNg4tkc8GQzAMEtR2wGNrCJlvnu1lHD1kDm" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg==" crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root{
    --navy:#030D26; --navy-2:#0B1A3D; --gold:#C9A24B; --gold-soft:#E4CD91; --steel:#7C97C4;
    --paper:#F7F5EF; --paper-2:#EFEBE0; --ink:#1B2233; --ink-soft:#5A6478;
    --ok:#3E7A5C; --ok-bg:#E4F0E9; --err:#A24B3C; --err-bg:#F5E7E2; --warn:#8A6A22; --warn-bg:#FBF1DC; --radius:14px;
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{font-family:'IBM Plex Sans', system-ui, sans-serif; background:var(--paper); color:var(--ink); min-height:100vh;}
  h1,h2,h3{font-family:'Fraunces', Georgia, serif; font-weight:600;}
  .mono{font-family:'IBM Plex Mono', monospace;}

  .topbar{position:sticky; top:0; z-index:20; height:52px; background:var(--navy); border-bottom:1px solid rgba(201,162,75,0.25); display:flex; align-items:center; padding:0 20px; gap:16px;}
  .topbar .mark{font-family:'Fraunces', serif; font-weight:700; font-size:17px; color:var(--gold);}
  .topbar .sub{font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--steel); margin-left:6px;}
  .topbar-tabs{display:flex; gap:4px; margin-left:24px;}
  .topbar-tabs button{background:transparent; border:none; color:rgba(247,245,239,0.65); padding:8px 14px; border-radius:8px; font-size:13px; cursor:pointer;}
  .topbar-tabs button:hover{background:rgba(255,255,255,0.06); color:var(--paper);}
  .topbar-tabs button.active{background:rgba(201,162,75,0.16); color:var(--gold-soft); font-weight:600;}
  .topbar-back{margin-left:auto; color:rgba(247,245,239,0.55); font-size:12.5px; text-decoration:none; padding:6px 12px; border:1px solid rgba(201,162,75,0.25); border-radius:8px;}
  .topbar-back:hover{color:var(--paper); border-color:rgba(201,162,75,0.5);}

  .wrap{max-width:1080px; margin:0 auto; padding:32px 24px 60px;}
  .card{background:#fff; border:1px solid rgba(3,13,38,0.08); border-radius:var(--radius); padding:22px 26px; margin-bottom:20px;}
  .card h3{margin:0 0 14px; font-size:17px; color:var(--navy);}
  .callout{background:linear-gradient(135deg, rgba(201,162,75,0.10), rgba(201,162,75,0.03)); border:1px solid rgba(201,162,75,0.4); border-left:4px solid var(--gold); border-radius:10px; padding:14px 18px; margin-bottom:18px;}
  .callout .tag{font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#8A6A22; margin-bottom:4px; display:block;}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th, td{text-align:left; padding:9px 10px; border-bottom:1px solid var(--paper-2);}
  th{color:var(--ink-soft); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:0.04em;}

  .jauge{height:8px; background:var(--paper-2); border-radius:999px; overflow:hidden; width:140px;}
  .jauge-fill{height:100%; background:linear-gradient(90deg, var(--steel), var(--gold));}
  .badge{display:inline-block; font-family:'IBM Plex Mono', monospace; font-size:11px; padding:3px 9px; border-radius:6px;}
  .badge.a_jour{background:var(--ok-bg); color:var(--ok);}
  .badge.en_cours{background:rgba(124,151,196,0.15); color:#3E5384;}
  .badge.en_retard{background:var(--err-bg); color:var(--err);}

  label{display:block; font-size:12.5px; color:var(--ink-soft); margin:12px 0 4px;}
  input, select, textarea{width:100%; padding:9px 11px; border:1px solid rgba(3,13,38,0.15); border-radius:8px; font-size:14px; font-family:inherit;}
  textarea{resize:vertical;}
  .btn{font-family:'IBM Plex Sans', sans-serif; font-weight:600; font-size:13.5px; border:none; border-radius:999px; padding:10px 20px; cursor:pointer;}
  .btn.primary{background:var(--navy); color:var(--gold-soft);}
  .btn.primary:hover{background:var(--navy-2);}
  .btn.ghost{background:transparent; color:var(--ink-soft); border:1px solid rgba(3,13,38,0.15);}
  .btn[disabled]{opacity:0.5; cursor:default;}
  .row{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media (max-width:640px){.row{grid-template-columns:1fr;}}

  .view{display:none;} .view.active{display:block;}
  .empty-state{padding:40px; text-align:center; color:var(--ink-soft);}

  .icon-btn{background:transparent; border:none; cursor:pointer; font-size:16px; padding:2px 6px; border-radius:6px;}
  .icon-btn:hover{background:var(--paper-2);}
  .modal-overlay{display:none; position:fixed; inset:0; background:rgba(3,13,38,0.55); z-index:100; align-items:flex-start; justify-content:center; overflow-y:auto; padding:40px 20px;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:#fff; border-radius:var(--radius); max-width:640px; width:100%; padding:26px 30px; position:relative;}
  .modal-box h3{margin:0 0 4px;}
  .modal-close{position:absolute; top:18px; right:20px; background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink-soft);}
  .unit-row{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--paper-2); gap:12px;}
  .unit-row .titre{font-size:13.5px;}
  .unit-row .meta{font-size:12px; color:var(--ink-soft); white-space:nowrap;}
  .unit-check{font-size:15px;}
</style>
</head>
<body>

<div class="topbar">
  <span class="mark">S@FE</span><span class="sub">Formation DDA · Formateur</span>
  <div class="topbar-tabs">
    <button data-view="perimetre" class="active">Périmètre</button>
    <button data-view="programmes">Programmes</button>
    <button data-view="sessions">Sessions</button>
    <button data-view="documents">Documents</button>
  </div>
  <a class="topbar-back" href="/">← Retour au CRM</a>
</div>

<div class="modal-overlay" id="detail-modal">
  <div class="modal-box">
    <button class="modal-close" id="detail-modal-close">×</button>
    <div id="detail-modal-content"></div>
  </div>
</div>

<div class="wrap">
  <div id="view-perimetre" class="view active">
    <div id="alertes-block"></div>
    <div class="card">
      <h3>Périmètre — collaborateurs sous obligation DDA</h3>
      <div id="perimetre-table"><div class="empty-state">Chargement…</div></div>
    </div>
  </div>

  <div id="view-programmes" class="view">
    <div class="card">
      <h3>Programmes existants</h3>
      <div id="programmes-list"><div class="empty-state">Chargement…</div></div>
    </div>
    <div class="card">
      <h3>Assigner un programme</h3>
      <form id="form-assign">
        <div class="row">
          <div><label>Collaborateur</label><select id="assign-collab" required></select></div>
          <div><label>Programme</label><select id="assign-programme" required></select></div>
        </div>
        <div class="row">
          <div><label>Année civile</label><input type="number" id="assign-annee" required></div>
          <div><label>Heures requises</label><input type="number" id="assign-heures" value="15" required></div>
        </div>
        <button class="btn primary" style="margin-top:16px" type="submit">Assigner</button>
      </form>
    </div>
    <div class="card">
      <h3>Dupliquer un programme</h3>
      <form id="form-duplicate">
        <label>Programme source</label><select id="dup-source" required></select>
        <label>Nouveau nom</label><input type="text" id="dup-nom" required>
        <label>Périmètre cible (séparé par des virgules)</label><input type="text" id="dup-perimetre" placeholder="professionnels, particuliers">
        <button class="btn primary" style="margin-top:16px" type="submit">Dupliquer</button>
      </form>
    </div>
  </div>

  <div id="view-sessions" class="view">
    <div class="card">
      <h3>Saisir une session (externe / présentielle / pair)</h3>
      <form id="form-session">
        <div class="row">
          <div><label>Collaborateur</label><select id="sess-collab" required></select></div>
          <div><label>Année civile</label><input type="number" id="sess-annee" required></div>
        </div>
        <label>Entité formatrice</label><input type="text" id="sess-entite" required>
        <div class="row">
          <div><label>Nom du formateur</label><input type="text" id="sess-formateur-nom"></div>
          <div><label>Qualification</label><input type="text" id="sess-formateur-qualif"></div>
        </div>
        <div class="row">
          <div><label>Type</label>
            <select id="sess-type"><option value="organisme_externe">Organisme externe</option><option value="presentiel">Présentiel interne</option><option value="intermediaire_pair">Intermédiaire pair</option></select>
          </div>
          <div><label>Modalité</label>
            <select id="sess-modalite"><option value="presentiel">Présentiel</option><option value="classe_virtuelle">Classe virtuelle</option><option value="e_learning">E-learning</option></select>
          </div>
        </div>
        <div class="row">
          <div><label>Date début</label><input type="date" id="sess-date-debut" required></div>
          <div><label>Date fin</label><input type="date" id="sess-date-fin" required></div>
        </div>
        <div class="row">
          <div><label>Durée (heures)</label><input type="number" step="0.5" id="sess-duree" required></div>
          <div><label>Thèmes (séparés par des virgules)</label><input type="text" id="sess-themes" placeholder="Compétences générales, Nature des produits"></div>
        </div>
        <label>Justificatif (PDF, optionnel)</label><input type="file" id="sess-fichier" accept="application/pdf">
        <button class="btn primary" style="margin-top:16px" type="submit">Enregistrer la session</button>
      </form>
    </div>
  </div>

  <div id="view-documents" class="view">
    <div class="card">
      <h3>Génération de documents</h3>
      <div class="row">
        <div><label>Collaborateur</label><select id="doc-collab" required></select></div>
        <div><label>Année civile</label><input type="number" id="doc-annee" required></div>
      </div>
      <div style="display:flex; gap:12px; margin-top:16px; flex-wrap:wrap;">
        <button class="btn primary" id="btn-recap">Générer le récapitulatif annuel</button>
        <button class="btn ghost" id="btn-attestations">Générer les attestations manquantes</button>
        <button class="btn ghost" id="btn-export-zip">Exporter le dossier ACPR (zip)</button>
      </div>
      <div id="documents-status" style="margin-top:16px; font-size:13.5px; color:var(--ink-soft);"></div>
      <div id="documents-sessions" style="margin-top:20px;"></div>
    </div>
  </div>
</div>

<script src="/assets/config.js"></script>
<script src="formation-admin-core.js"></script>
<script src="formation-admin-perimetre.js"></script>
<script src="formation-admin-programmes.js"></script>
<script src="formation-admin-sessions.js"></script>
<script src="formation-admin-documents.js"></script>
<script>
document.querySelectorAll('.topbar-tabs button').forEach(btn => {
  btn.onclick = () => switchAdminView(btn.dataset.view);
});
function switchAdminView(name){
  document.querySelectorAll('.topbar-tabs button').forEach(b => b.classList.toggle('active', b.dataset.view === name));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + name));
  if (name === 'perimetre') loadPerimetre();
  if (name === 'programmes') loadProgrammes();
  if (name === 'sessions') loadSessionsForm();
  if (name === 'documents') loadDocumentsForm();
}
initFormationAdmin();
</script>
</body>
</html>
