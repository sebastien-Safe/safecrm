<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss://*.supabase.co blob:;">
  <meta name="referrer" content="strict-origin-when-cross-origin">

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>S@FE Prospection — 🔌 Connecteurs</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js" integrity="sha384-JWEyvHh+lRf0sN/WWY+QTQwX+CyWqmNg4tkc8GQzAMEtR2wGNrCJlvnu1lHD1kDm" crossorigin="anonymous"></script>
<style>
:root{
  --navy:#0a1628;--navy-mid:#142240;--line:rgba(255,255,255,.08);
  --mut:#94a3b8;--mut-2:#cbd5e1;--accent:#3b82f6;--accent-2:#2563eb;
  --gold:#f59e0b;--gold-light:#fbbf24;--alert:#ff4d5e;--ok:#22c55e;--warn:#f59e0b;
  --r:14px;--r-sm:10px;
  --ff-disp:'Sora',sans-serif;--ff-body:'IBM Plex Sans',sans-serif;--ff-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff-body);background:var(--navy);color:var(--mut-2);min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(900px 600px at 85% -5%,rgba(37,99,235,.18),transparent 60%),
    radial-gradient(700px 600px at -10% 20%,rgba(245,158,11,.07),transparent 55%),
    linear-gradient(180deg,var(--navy),var(--navy-mid));}
a{color:inherit;text-decoration:none}
h1,h2,h3{font-family:var(--ff-disp);color:#fff;letter-spacing:-.02em}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);
  background:rgba(10,17,36,.85);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:0 24px;height:60px}
.back-btn{font-size:.78rem;color:var(--mut);border:1px solid var(--line);
  border-radius:8px;padding:5px 12px;transition:.15s;font-family:var(--ff-mono)}
.back-btn:hover{color:#fff;border-color:rgba(255,255,255,.2)}
.topbar-title{font-family:var(--ff-disp);font-weight:800;font-size:1.05rem;color:#fff}
.topbar-sub{font-size:.74rem;color:var(--mut);font-family:var(--ff-mono)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}

/* LAYOUT */
.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 24px}

/* FILTER TABS */
.filter-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:22px}
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap}
.filter-tab{font-family:var(--ff-mono);font-size:.72rem;padding:5px 14px;border-radius:20px;
  border:1px solid var(--line);background:transparent;color:var(--mut);cursor:pointer;transition:.15s}
.filter-tab:hover{color:#fff;border-color:rgba(255,255,255,.2)}
.filter-tab.active{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4);color:var(--gold)}

/* GRID */
.conn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}

/* CARD */
.conn-card{background:rgba(20,34,64,.7);border:1px solid var(--line);border-radius:var(--r);
  padding:16px 18px;transition:.18s}
.conn-card:hover{border-color:rgba(255,255,255,.15);background:rgba(20,34,64,.9)}
.conn-card.actif{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.04)}
.conn-card-top{display:flex;align-items:flex-start;gap:12px}
.conn-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:1.15rem;flex-shrink:0;background:rgba(255,255,255,.06);border:1px solid var(--line)}
.conn-name{font-weight:700;font-size:.87rem;color:#fff;margin-bottom:2px}
.conn-cat{font-family:var(--ff-mono);font-size:.64rem;color:var(--mut);letter-spacing:.06em;text-transform:uppercase}
.help-btn{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--mut);
  border-radius:50%;width:24px;height:24px;flex-shrink:0;cursor:pointer;font-size:.7rem;
  display:flex;align-items:center;justify-content:center;transition:.15s}
.help-btn:hover{color:#fff;border-color:rgba(255,255,255,.25)}

/* SWITCH */
.switch{display:flex;align-items:center;gap:9px;margin-top:14px;cursor:pointer;user-select:none}
.switch input{display:none}
.slider{width:36px;height:20px;border-radius:20px;background:rgba(255,255,255,.14);
  position:relative;transition:.2s;flex-shrink:0}
.slider::before{content:"";position:absolute;width:14px;height:14px;border-radius:50%;
  background:#fff;top:3px;left:3px;transition:.2s}
.switch input:checked + .slider{background:var(--ok)}
.switch input:checked + .slider::before{transform:translateX(16px)}
.switch-label{font-family:var(--ff-mono);font-size:.72rem;color:var(--mut)}

/* MODAL (aide) */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--navy-mid);border:1px solid var(--line);border-radius:20px;
  width:min(440px,94vw);max-height:92vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0}
.modal-title{font-family:var(--ff-disp);font-size:1rem;font-weight:800;color:#fff;display:flex;align-items:center;gap:10px}
.modal-close{background:none;border:none;color:var(--mut);font-size:1.2rem;cursor:pointer;
  padding:4px 8px;border-radius:6px;transition:.15s}
.modal-close:hover{color:#fff;background:rgba(255,255,255,.08)}
.modal-body{padding:18px 24px 22px}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:500;font-family:var(--ff-mono);
  font-size:.8rem;padding:10px 18px;border-radius:10px;
  background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--ok);
  opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.err{background:rgba(255,77,94,.15);border-color:rgba(255,77,94,.3);color:var(--alert)}

.empty{text-align:center;padding:60px 20px;color:var(--mut)}
.empty .ico{font-size:2.5rem;margin-bottom:10px}
</style>
</head>
<body>
<div id="toast"></div>

<!-- MODAL AIDE -->
<div class="modal-overlay" id="help-modal" onclick="if(event.target===this)closeHelp()">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title"><span id="h-ico">🔌</span><span id="h-title">Connecteur</span></div>
      <button class="modal-close" onclick="closeHelp()">✕</button>
    </div>
    <div class="modal-body">
      <p id="h-text" style="font-size:.85rem;line-height:1.65;color:var(--mut-2)"></p>
    </div>
  </div>
</div>

<!-- PAGE -->
<header class="topbar">
  <a href="/index.html" class="back-btn">← CRM</a>
  <div>
    <div class="topbar-title">🔌 Connecteurs</div>
    <div class="topbar-sub">Centre de configuration des services externes</div>
  </div>
  <div class="topbar-right">
    <span id="topbar-stats" style="font-family:var(--ff-mono);font-size:.74rem;color:var(--mut)"></span>
  </div>
</header>

<div class="page">
  <div style="background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);
    border-radius:var(--r-sm);padding:10px 14px;margin-bottom:22px;
    font-size:.78rem;color:var(--mut-2);font-family:var(--ff-mono)">
    ⚠️ L'interrupteur autorise ou bloque les appels de SafeCRM vers ce service.
    Les clés API se configurent dans Supabase (voir ❓ sur chaque carte), jamais ici.
  </div>

  <div class="filter-row">
    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-cat="all" onclick="filterCat('all',this)">Tous</button>
      <button class="filter-tab" data-cat="ia" onclick="filterCat('ia',this)">🤖 IA</button>
      <button class="filter-tab" data-cat="paiement" onclick="filterCat('paiement',this)">💳 Paiement</button>
      <button class="filter-tab" data-cat="social" onclick="filterCat('social',this)">📣 Social</button>
      <button class="filter-tab" data-cat="seo" onclick="filterCat('seo',this)">🔍 SEO</button>
      <button class="filter-tab" data-cat="compta" onclick="filterCat('compta',this)">📊 Compta</button>
      <button class="filter-tab" data-cat="notif" onclick="filterCat('notif',this)">🔔 Notifs</button>
      <button class="filter-tab" data-cat="signature" onclick="filterCat('signature',this)">✍️ Signature</button>
    </div>
  </div>

  <div class="conn-grid" id="conn-grid">
    <div class="empty"><div class="ico">🔌</div><p>Chargement…</p></div>
  </div>
</div>

<script src="/assets/config.js"></script>
<script src="/assets/dpo/connectors-guard.js"></script>
<script>
const SUPA_URL = window.SUPABASE_URL || 'https://qdjmzietysukediqkebg.supabase.co';
const SUPA_KEY = window.SUPABASE_ANON_KEY || 'sb_publishable_8uD3m60n9GfMt2h_GkmB7w_MpdFN5_s';
const supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);

let allRows = [];
let currentCat = 'all';

const CAT_LABELS = {
  ia:'IA', paiement:'Paiement', seo:'SEO', social:'Social',
  compta:'Compta', notif:'Notifications', signature:'Signature', autre:'Autre'
};

// Procédure de rotation de clé par connecteur — cf. code des edge functions.
const HELP_TEXT = {
  google_places: "Google Places API + Places API (New) : une seule clé. À définir dans Supabase → Edge Functions → Secrets, sous le nom GOOGLE_PLACES_API_KEY.",
  pagespeed:     "PageSpeed Insights API. À définir dans Supabase → Edge Functions → Secrets, sous le nom PAGESPEED_API_KEY.",
  google_gsc:    "Google Search Console n'utilise PAS une clé API mais des identifiants OAuth. Dans Google Cloud Console : Identifiants → ID client OAuth (pas « Clé API »). Puis dans Supabase → Edge Functions → Secrets : GOOGLE_OAUTH_CLIENT_ID et GOOGLE_OAUTH_CLIENT_SECRET.",
  google_gmb:    "Aucune intégration technique n'existe encore dans SafeCRM pour cette API — ce connecteur n'a aucun effet fonctionnel pour l'instant, même activé.",
  anthropic:     "Clé lue depuis Supabase → Edge Functions → Secrets, sous le nom ANTHROPIC_API_KEY.",
  grok:          "Clé lue depuis Supabase → Edge Functions → Secrets, sous le nom GROK_API_KEY.",
  stripe:        "Clés lues depuis Supabase → Edge Functions → Secrets, sous les noms STRIPE_SECRET_KEY et STRIPE_WEBHOOK_SECRET.",
  brevo:         "Clé lue depuis Supabase → Edge Functions → Secrets, sous le nom BREVO (+ BREVO_TEMPLATE_* pour les modèles d'email utilisés).",
  discord:       "Aucune intégration technique (webhook) n'existe encore dans SafeCRM — ce connecteur n'a aucun effet fonctionnel pour l'instant, même activé.",
  linkedin:      "Aucune intégration technique (edge function) n'existe encore dans SafeCRM — ce connecteur n'a aucun effet fonctionnel pour l'instant, même activé. Si elle est développée un jour, les identifiants attendus sont LINKEDIN_CLIENT_ID et LINKEDIN_API_SECRET dans Supabase → Edge Functions → Secrets.",
};
const HELP_FALLBACK = "Procédure non documentée pour ce connecteur — vérifiez le code de l'edge function correspondante avant d'activer.";

/* ---- INIT ---- */
document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await supa.auth.getSession();
  if (!session) { window.location.href = '/'; return; }
  await reload();
});

async function reload() {
  const { data } = await supa.from('safe_connectors').select('*').order('cat').order('label');
  allRows = data || [];
  updateStats();
  renderGrid();
}

function updateStats() {
  const actifs = allRows.filter(r => r.statut === 'actif').length;
  document.getElementById('topbar-stats').textContent =
    `${actifs} actif${actifs>1?'s':''} / ${allRows.length}`;
}

/* ---- GRID ---- */
function renderGrid() {
  const list = currentCat === 'all' ? allRows : allRows.filter(r => r.cat === currentCat);
  const grid = document.getElementById('conn-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty"><div class="ico">🔌</div><p>Aucun connecteur dans cette catégorie.</p></div>';
    return;
  }
  grid.innerHTML = list.map(r => {
    const on = r.statut === 'actif';
    return `
      <div class="conn-card ${on?'actif':''}">
        <div class="conn-card-top">
          <div class="conn-ico">${r.ico||'🔌'}</div>
          <div style="flex:1;min-width:0">
            <div class="conn-name">${escHtml(r.label)}</div>
            <div class="conn-cat">${CAT_LABELS[r.cat]||r.cat}</div>
          </div>
          <button class="help-btn" title="Comment configurer la clé ?" onclick="openHelp('${r.service_key}')">❓</button>
        </div>
        <label class="switch">
          <input type="checkbox" ${on?'checked':''} onchange="toggleConnector('${r.service_key}')">
          <span class="slider"></span>
          <span class="switch-label">${on?'Actif':'Inactif'}</span>
        </label>
      </div>`;
  }).join('');
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

/* ---- TOGGLE ---- */
async function toggleConnector(key) {
  const r = allRows.find(x => x.service_key === key);
  if (!r) return;
  const turningOn = r.statut !== 'actif';
  const { data: { user } } = await supa.auth.getUser();

  const payload = turningOn
    ? { statut:'actif', activated_by:user?.id, activated_at:new Date().toISOString(), updated_at:new Date().toISOString() }
    : { statut:'desactive', desactivated_at:new Date().toISOString(), updated_at:new Date().toISOString() };

  const { error } = await supa.from('safe_connectors').update(payload).eq('service_key', key);
  if (error) { toast('Erreur : ' + error.message, true); await reload(); return; }

  await supa.from('safe_connectors_log').insert({
    connector_key:key, action: turningOn ? 'activated' : 'desactivated', done_by:user?.id
  });

  if (window.invalidateConnectorCache) invalidateConnectorCache(key);
  toast(turningOn ? `${r.label} activé ✅` : `${r.label} désactivé`);
  await reload();
}

/* ---- AIDE ---- */
function openHelp(key) {
  const r = allRows.find(x => x.service_key === key);
  if (!r) return;
  document.getElementById('h-ico').textContent   = r.ico || '🔌';
  document.getElementById('h-title').textContent = r.label;
  document.getElementById('h-text').textContent   = HELP_TEXT[key] || HELP_FALLBACK;
  document.getElementById('help-modal').classList.add('open');
}
function closeHelp() {
  document.getElementById('help-modal').classList.remove('open');
}

/* ---- UTILS ---- */
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

let _toastTimer;
function toast(msg, err=false) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show'+(err?' err':'');
  clearTimeout(_toastTimer); _toastTimer=setTimeout(()=>el.className='',3000);
}
</script>
</body>
</html>
