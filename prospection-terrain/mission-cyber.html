<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>S@FE — Diagnostic Cybersécurité</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preload" as="font" type="font/woff2" href="/assets/fonts/sora-800.woff2" crossorigin>
<style>
:root{
  --navy:#0a1628;--navy-mid:#142240;--line:rgba(255,255,255,.08);
  --mut:#94a3b8;--mut-2:#cbd5e1;--gold:#f59e0b;
  --ok:#22c55e;--alert:#ff4d5e;--warn:#f59e0b;
  --m:#06b6d4;--m2:#0891b2;
  --r:14px;--ff-disp:'Sora',sans-serif;--ff-body:'IBM Plex Sans',sans-serif;--ff-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:var(--ff-body);background:var(--navy);color:var(--mut-2);-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(700px 500px at 80% 0%,rgba(6,182,212,.16),transparent 60%),
    linear-gradient(180deg,var(--navy),var(--navy-mid));}
h2,h3{font-family:var(--ff-disp);color:#fff;line-height:1.2;letter-spacing:-.02em}

.topbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);background:rgba(10,17,36,.9);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 20px;height:54px;flex-shrink:0}
.brand{font-family:var(--ff-disp);font-weight:800;font-size:1.1rem;color:#fff}.brand b{color:var(--gold)}
.chip{font-family:var(--ff-mono);font-size:.65rem;letter-spacing:.12em;color:var(--m);text-transform:uppercase;border:1px solid rgba(6,182,212,.35);padding:3px 10px;border-radius:20px}
.btn-back{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--mut);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.78rem;font-family:var(--ff-body);transition:.15s;text-decoration:none;display:inline-block}
.btn-back:hover{border-color:var(--m);color:var(--m)}

.prog-wrap{padding:10px 20px 0;position:relative;z-index:1}
.prog-labels{display:flex;justify-content:space-between;font-family:var(--ff-mono);font-size:.63rem;color:var(--mut);margin-bottom:5px}
.prog-bar{height:4px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--m),#67e8f9);border-radius:99px;transition:width .4s ease}

.wiz{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 20px 48px;max-width:520px;margin:0 auto;width:100%}
.q-screen{display:none}
.q-screen.active{display:block;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.domaine{font-family:var(--ff-mono);font-size:.63rem;letter-spacing:.15em;color:var(--m);text-transform:uppercase;margin-bottom:10px}
.q-text{font-family:var(--ff-disp);font-size:1.22rem;font-weight:700;color:#fff;line-height:1.4;margin-bottom:22px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{padding:14px 18px;border-radius:13px;border:1.5px solid var(--line);background:rgba(20,34,64,.85);color:var(--mut-2);font-size:.93rem;text-align:left;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:12px;width:100%;font-family:var(--ff-body)}
.opt:hover{border-color:var(--m);background:rgba(6,182,212,.08);color:#fff}
.opt.sel-ok{border-color:var(--ok);background:rgba(34,197,94,.1);color:#86efac}
.opt.sel-warn{border-color:var(--warn);background:rgba(245,158,11,.1);color:var(--gold)}
.opt.sel-alert{border-color:var(--alert);background:rgba(255,77,94,.1);color:#fca5a5}
.opt-ico{font-size:1.1rem;flex-shrink:0;width:26px;text-align:center}
.prev-btn{margin-top:22px;background:transparent;border:none;color:var(--mut);font-size:.82rem;font-family:var(--ff-body);cursor:pointer;padding:6px 0;display:flex;align-items:center;gap:6px;transition:.12s}
.prev-btn:hover{color:#fff}
.prev-btn:disabled{opacity:.25;cursor:not-allowed}

#results{display:none;position:relative;z-index:1;max-width:520px;margin:0 auto;padding:28px 20px 60px;text-align:center;width:100%;animation:fadeUp .3s ease}
.score-ring{width:110px;height:110px;border-radius:50%;margin:0 auto 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:4px solid}
.score-n{font-family:var(--ff-disp);font-size:2rem;font-weight:800;line-height:1}
.score-s{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;opacity:.8;margin-top:2px}
.risk-chip{display:inline-block;font-family:var(--ff-mono);font-size:.78rem;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:20px}
.findings{background:rgba(20,34,64,.85);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;margin-bottom:22px;text-align:left}
.findings-title{font-family:var(--ff-mono);font-size:.63rem;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.fi{font-size:.83rem;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:flex-start;gap:8px;line-height:1.4}
.fi:last-child{border-bottom:none}
.btn-pdf{width:100%;padding:14px;border-radius:13px;background:linear-gradient(135deg,var(--m),var(--m2));border:none;color:#fff;font-family:var(--ff-disp);font-weight:700;font-size:.95rem;cursor:pointer;transition:.15s;box-shadow:0 4px 16px rgba(6,182,212,.3);margin-bottom:10px}
.btn-pdf:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(6,182,212,.4)}
.btn-rst{width:100%;padding:11px;border-radius:11px;border:1px solid var(--line);background:transparent;color:var(--mut);font-family:var(--ff-body);font-size:.85rem;cursor:pointer;transition:.12s}
.btn-rst:hover{border-color:var(--m);color:var(--m)}

.modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
@media(min-width:500px){.modal{align-items:center}}
.modal-box{background:#0f1e3d;border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;max-width:460px;padding:22px 20px 36px;max-height:90vh;overflow-y:auto}
@media(min-width:500px){.modal-box{border-radius:20px}}
.modal-title{font-family:var(--ff-disp);font-size:1rem;color:#fff;margin-bottom:3px}
.modal-sub{font-size:.78rem;color:var(--mut);margin-bottom:18px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.field label{font-size:.7rem;color:var(--mut);font-family:var(--ff-mono);letter-spacing:.05em}
.field input{background:rgba(0,0,0,.35);border:1.5px solid var(--line);border-radius:9px;padding:10px 13px;color:#fff;font-family:var(--ff-body);font-size:.88rem;transition:.15s}
.field input:focus{outline:none;border-color:var(--m)}
.consent{display:flex;align-items:flex-start;gap:10px;padding:12px;background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.2);border-radius:10px;margin-bottom:16px;cursor:pointer;font-size:.78rem;color:var(--mut-2);line-height:1.5}
.consent input[type=checkbox]{width:18px;height:18px;flex-shrink:0;margin-top:1px;accent-color:var(--m);cursor:pointer}
.btn-gen{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,var(--m),var(--m2));border:none;color:#fff;font-family:var(--ff-disp);font-weight:700;font-size:.9rem;cursor:pointer;transition:.15s;margin-bottom:8px}
.btn-gen:hover{transform:translateY(-1px)}
.btn-cancel{width:100%;padding:9px;border-radius:9px;border:1px solid var(--line);background:transparent;color:var(--mut);font-family:var(--ff-body);font-size:.82rem;cursor:pointer}

.toast{position:fixed;bottom:20px;right:16px;z-index:500;padding:10px 15px;border-radius:10px;font-size:.82rem;font-weight:600;transform:translateY(16px);opacity:0;transition:.22s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.4);color:#86efac}
.toast.err{background:rgba(255,77,94,.15);border:1px solid rgba(255,77,94,.4);color:#fca5a5}
</style>
</head>
<body style="display:flex;flex-direction:column;min-height:100vh">

<div class="topbar">
  <div class="brand">S<b>@</b>FE</div>
  <span class="chip">🛡️ Cybersécurité</span>
  <a class="btn-back" href="/prospection-terrain/">← Retour</a>
</div>

<div class="prog-wrap" id="prog-wrap">
  <div class="prog-labels">
    <span id="q-label">Question 1 / 7</span>
    <span id="q-pct">0 %</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</div>

<div class="wiz" id="wiz"></div>

<div id="results">
  <div style="font-family:var(--ff-mono);font-size:.63rem;letter-spacing:.15em;color:var(--m);text-transform:uppercase;margin-bottom:12px">✓ Diagnostic terminé</div>
  <div class="score-ring" id="score-ring">
    <div class="score-n" id="score-n">—</div>
    <div class="score-s">Sécurité</div>
  </div>
  <div class="risk-chip" id="risk-chip"></div>
  <div class="findings" id="findings"></div>
  <button class="btn-pdf" onclick="openModal()">📄 Générer le rapport PDF</button>
  <button class="btn-rst" onclick="restart()">↺ Nouveau diagnostic</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-title">📄 Rapport Diagnostic Cybersécurité</div>
    <div class="modal-sub">Coordonnées du prospect pour le rapport</div>
    <div class="field"><label>NOM PRÉNOM *</label><input id="f-nom" type="text" placeholder="Marie Dupont" autocomplete="name"></div>
    <div class="field"><label>ENTREPRISE</label><input id="f-ent" type="text" placeholder="Dupont SAS" autocomplete="organization"></div>
    <div class="field"><label>E-MAIL *</label><input id="f-email" type="email" placeholder="contact@entreprise.fr" autocomplete="email"></div>
    <div class="field"><label>TÉLÉPHONE</label><input id="f-tel" type="tel" placeholder="06 12 34 56 78" autocomplete="tel"></div>
    <label class="consent">
      <input type="checkbox" id="f-rgpd">
      <span>J'autorise S@FE à conserver mes coordonnées dans le cadre du suivi de ce diagnostic. Données non transmises à des tiers (Art. 13 RGPD).</span>
    </label>
    <button class="btn-gen" onclick="genPDF()">📥 Télécharger le rapport PDF</button>
    <button class="btn-cancel" onclick="closeModal()">Annuler</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const _SB_URL = 'https://qdjmzietysukediqkebg.supabase.co';
const _AUDIT_SECRET = 'safe-audit-2026';

async function sendAuditEmail(to_email, to_name, params) {
  try {
    const r = await fetch(`${_SB_URL}/functions/v1/send-audit-email`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-audit-secret': _AUDIT_SECRET },
      body: JSON.stringify({ to_email, to_name, params }),
    });
    if (r.ok) showToast('Rapport envoyé par email ✓', 'ok');
    else showToast('PDF généré — email non envoyé', 'warn');
  } catch { showToast('PDF généré — email non envoyé', 'warn'); }
}

const Q = [
  {id:'c1', dom:'👤 Gouvernance', q:"Un responsable de la sécurité informatique est-il désigné dans votre structure ?",
   opts:[{ico:'✅',l:"Oui, formalisé",r:'ok'},{ico:'⚠️',l:"Informellement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
  {id:'c2', dom:'🔑 Authentification', q:"L'authentification à deux facteurs (MFA) est-elle activée sur vos comptes critiques ?",
   opts:[{ico:'✅',l:"Oui, sur tous les comptes admin",r:'ok'},{ico:'⚠️',l:"Partiellement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
  {id:'c3', dom:'💻 Postes de travail', q:"Vos postes et serveurs sont-ils à jour (OS, logiciels, antivirus) ?",
   opts:[{ico:'✅',l:"Oui, mises à jour automatiques",r:'ok'},{ico:'⚠️',l:"Manuellement / irrégulièrement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
  {id:'c4', dom:'📡 Réseau', q:"Le Wi-Fi professionnel est-il séparé du réseau invités / clients ?",
   opts:[{ico:'✅',l:"Oui, réseaux distincts",r:'ok'},{ico:'⚠️',l:"Même réseau avec mot de passe",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
  {id:'c5', dom:'💾 Sauvegardes', q:"Des sauvegardes régulières sont-elles réalisées et testées (restauration) ?",
   opts:[{ico:'✅',l:"Oui, avec test de restauration",r:'ok'},{ico:'⚠️',l:"Sauvegardes sans test",r:'warn'},{ico:'❌',l:"Non / irrégulières",r:'alert'}]},
  {id:'c6', dom:'🎣 Sensibilisation', q:"Vos équipes ont-elles été sensibilisées aux tentatives de phishing ?",
   opts:[{ico:'✅',l:"Oui, formation réalisée",r:'ok'},{ico:'⚠️',l:"Information ponctuelle",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
  {id:'c7', dom:'🌐 Sécurité web', q:"Votre site web est-il en HTTPS avec un certificat SSL valide et à jour ?",
   opts:[{ico:'✅',l:"Oui, note A / A+",r:'ok'},{ico:'⚠️',l:"HTTPS mais certificat faible",r:'warn'},{ico:'❌',l:"Non / HTTP",r:'alert'}]},
];

const W={ok:2,warn:1,alert:0};
const MAX=Q.length*2;
let cur=0, ans={};

function init(){
  const wiz=document.getElementById('wiz');
  wiz.innerHTML=Q.map((q,i)=>`
    <div class="q-screen" id="qs-${i}">
      <div class="domaine">${q.dom}</div>
      <div class="q-text">${q.q}</div>
      <div class="opts">
        ${q.opts.map((o,j)=>`<button class="opt" id="opt-${i}-${j}" onclick="pick(${i},${j},'${o.r}',\`${o.l}\`)">
          <span class="opt-ico">${o.ico}</span><span>${o.l}</span>
        </button>`).join('')}
      </div>
      <button class="prev-btn" onclick="goBack()" ${i===0?'disabled':''}>← Question précédente</button>
    </div>`).join('');
  show(0);
}

function show(i){
  document.querySelectorAll('.q-screen').forEach(el=>el.classList.remove('active'));
  document.getElementById(`qs-${i}`)?.classList.add('active');
  const saved=ans[Q[i]?.id];
  if(saved){ Q[i].opts.forEach((o,j)=>{ const b=document.getElementById(`opt-${i}-${j}`); if(b){ b.classList.remove('sel-ok','sel-warn','sel-alert'); if(o.l===saved.l) b.classList.add('sel-'+saved.r); } }); }
  const pct=Math.round(Object.keys(ans).length/Q.length*100);
  document.getElementById('q-label').textContent=`Question ${i+1} / ${Q.length}`;
  document.getElementById('q-pct').textContent=pct+' %';
  document.getElementById('prog').style.width=pct+'%';
}

function pick(qi,oi,risk,label){
  ans[Q[qi].id]={r:risk,l:label,q:Q[qi].q};
  Q[qi].opts.forEach((_,j)=>{ const b=document.getElementById(`opt-${qi}-${j}`); if(b) b.classList.remove('sel-ok','sel-warn','sel-alert'); });
  document.getElementById(`opt-${qi}-${oi}`).classList.add('sel-'+risk);
  setTimeout(()=>{ if(qi===Q.length-1) showResults(); else{ cur=qi+1; show(cur); } },380);
}

function goBack(){ if(cur>0){ cur--; show(cur); } }

function showResults(){
  document.getElementById('prog-wrap').style.display='none';
  document.getElementById('wiz').style.display='none';
  document.getElementById('results').style.display='block';
  const total=Object.values(ans).reduce((s,a)=>s+W[a.r],0);
  const pct=Math.round(total/MAX*100);
  let rColor,rLabel,rBg,rBorder;
  if(pct>=80){rColor='#86efac';rLabel='✅ Posture satisfaisante';rBg='rgba(34,197,94,.12)';rBorder='var(--ok)'}
  else if(pct>=60){rColor=var_('gold');rLabel='⚠️ Risque modéré';rBg='rgba(245,158,11,.12)';rBorder='var(--warn)'}
  else if(pct>=40){rColor='#fca5a5';rLabel='🔴 Risque élevé';rBg='rgba(255,77,94,.1)';rBorder='var(--alert)'}
  else{rColor='#fca5a5';rLabel='🚨 Critique';rBg='rgba(255,77,94,.15)';rBorder='var(--alert)'}
  const ring=document.getElementById('score-ring');
  ring.style.borderColor=rBorder;ring.style.background=rBg;ring.style.color=rColor;
  document.getElementById('score-n').textContent=pct+'%';
  const chip=document.getElementById('risk-chip');
  chip.textContent=rLabel;chip.style.background=rBg;chip.style.border='1px solid '+rBorder;chip.style.color=rColor;
  const crit=Object.values(ans).filter(a=>a.r==='alert');
  const warn=Object.values(ans).filter(a=>a.r==='warn');
  let html='<div class="findings-title">Points à corriger</div>';
  if(!crit.length&&!warn.length){ html+='<div class="fi">✅ Aucun point critique — bonne posture de sécurité</div>'; }
  else{ crit.forEach(a=>html+=`<div class="fi"><span style="color:var(--alert);flex-shrink:0">❌</span><span>${a.q}</span></div>`); warn.forEach(a=>html+=`<div class="fi"><span style="color:var(--warn);flex-shrink:0">⚠️</span><span>${a.q}</span></div>`); }
  document.getElementById('findings').innerHTML=html;
}

function var_(n){ return getComputedStyle(document.documentElement).getPropertyValue('--'+n).trim(); }
function openModal(){ document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

function genPDF(){
  const nom=document.getElementById('f-nom').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const ent=document.getElementById('f-ent').value.trim();
  const tel=document.getElementById('f-tel').value.trim();
  const rgpd=document.getElementById('f-rgpd').checked;
  if(!nom||!email){ showToast('Nom et e-mail obligatoires','err'); return; }
  if(!rgpd){ showToast('Consentement RGPD requis','err'); return; }
  const total=Object.values(ans).reduce((s,a)=>s+W[a.r],0);
  const pct=Math.round(total/MAX*100);
  const now=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  const lvlColor=pct>=80?'#065f46':pct>=60?'#92400e':pct>=40?'#991b1b':'#7f1d1d';
  const lvl=pct>=80?'Posture satisfaisante':pct>=60?'Risque modéré':pct>=40?'Risque élevé':'Critique';
  const rows=Q.map(q=>{ const a=ans[q.id]; if(!a) return '';
    const badge=a.r==='ok'?`<span style="background:#d1fae5;color:#065f46;padding:2px 9px;border-radius:99px;font-size:11px">✅ OK</span>`:a.r==='warn'?`<span style="background:#fef3c7;color:#92400e;padding:2px 9px;border-radius:99px;font-size:11px">⚠️ Partiel</span>`:`<span style="background:#fee2e2;color:#991b1b;padding:2px 9px;border-radius:99px;font-size:11px">❌ À corriger</span>`;
    return `<tr><td style="padding:8px 10px;border-bottom:1px solid #f3f4f6;font-size:12px;width:55%">${q.q}</td><td style="padding:8px 10px;border-bottom:1px solid #f3f4f6;font-size:12px">${a.l}</td><td style="padding:8px 10px;border-bottom:1px solid #f3f4f6">${badge}</td></tr>`;}).join('');
  const html=`<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><title>Rapport Cyber — ${nom}</title>
<style>@page{margin:18mm 16mm}body{font-family:Arial,sans-serif;color:#1f2937;font-size:13px;line-height:1.5}

.prospect{background:#ecfeff;border:1px solid #a5f3fc;border-radius:8px;padding:12px 14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:4px}
.pf label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#0e7490;font-weight:700}.pf span{font-size:13px;display:block;margin-top:1px}
.score-box{text-align:center;padding:16px;border:2px solid;border-radius:12px;margin-bottom:16px}

table{width:100%;border-collapse:collapse}th{background:#06b6d4;color:#fff;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px}

</style></head><body>
<div class="header"><div><div class="logo">S<b>@</b>FE<small>Safe Digitalisation</small></div></div><div style="text-align:right"><div style="font-size:15px;font-weight:700;color:#06b6d4">Diagnostic Cybersécurité</div><small style="color:#6b7280">${now}</small></div></div>
<div class="prospect"><div class="pf"><label>Prospect</label><span>${nom}</span></div><div class="pf"><label>Entreprise</label><span>${ent||'—'}</span></div><div class="pf"><label>E-mail</label><span>${email}</span></div><div class="pf"><label>Téléphone</label><span>${tel||'—'}</span></div></div>
<div class="score-box" style="border-color:${pct>=80?'#22c55e':pct>=60?'#f59e0b':'#ef4444'};background:${pct>=80?'#f0fdf4':pct>=60?'#fffbeb':'#fef2f2'}">
<div class="score-pct" style="color:${lvlColor}">${pct}%</div><div class="score-lbl">Score de sécurité — ${lvl}</div></div>
<table><thead><tr><th>Question</th><th>Réponse</th><th>Statut</th></tr></thead><tbody>${rows}</tbody></table>
<div class="consent">✓ Consentement RGPD recueilli le ${now}. ${nom} (${email}) autorise S@FE à conserver ses coordonnées. Données non transmises à des tiers — Art. 13 RGPD.</div>
<div class="footer"><span>S@FE — Safe Digitalisation · contact@safe-digitalisation.fr</span><span>Rapport du ${now}</span></div>
</body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();w.onload=()=>w.print();
  closeModal();showToast('Rapport généré !','ok');

  const niveauBg     = pct>=80?'#f0fdf4':pct>=60?'#fffbeb':pct>=40?'#fef2f2':'#fdf4ff';
  const niveauBorder = pct>=80?'#22c55e':pct>=60?'#f59e0b':'#ef4444';
  sendAuditEmail(email, nom, {
    nom, entreprise: ent||'—', email, telephone: tel||'—',
    mission: 'Cybersécurité', mission_color: '#06b6d4',
    score: String(pct), niveau: lvl, niveau_color: lvlColor,
    niveau_bg: niveauBg, niveau_border: niveauBorder,
    rows, recommandations: '',
    date: now, conseiller: 'Safe Digitalisation',
    rdv_url: 'https://crm.safe-digitalisation.fr/booking.html',
  });
}

function restart(){
  ans={}; cur=0;
  document.getElementById('prog-wrap').style.display='block';
  document.getElementById('wiz').style.display='flex';
  document.getElementById('results').style.display='none';
  show(0);
}

let _tt;
function showToast(msg,type='info'){ const t=document.getElementById('toast'); clearTimeout(_tt); t.textContent=msg; t.className='toast '+type+' show'; _tt=setTimeout(()=>t.classList.remove('show'),2800); }

init();
</script>
</body>
</html>
