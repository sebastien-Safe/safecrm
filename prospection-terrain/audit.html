<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>S@FE — Audit Multi-Missions</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preload" as="font" type="font/woff2" href="/assets/fonts/sora-800.woff2" crossorigin>
<style>
:root{
  --navy:#0a1628;--navy-mid:#142240;--line:rgba(255,255,255,.08);
  --mut:#94a3b8;--mut-2:#cbd5e1;--gold:#f59e0b;--gold-l:#fbbf24;
  --ok:#22c55e;--alert:#ff4d5e;--warn:#f59e0b;
  --r:14px;--ff-disp:'Sora',sans-serif;--ff-body:'IBM Plex Sans',sans-serif;--ff-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:var(--ff-body);background:var(--navy);color:var(--mut-2);-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(800px 600px at 70% -10%,rgba(37,99,235,.18),transparent 60%),
    radial-gradient(600px 400px at -5% 40%,rgba(245,158,11,.08),transparent 55%),
    linear-gradient(180deg,var(--navy),var(--navy-mid));}
h2,h3{font-family:var(--ff-disp);color:#fff;line-height:1.2;letter-spacing:-.02em}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);background:rgba(10,17,36,.92);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 20px;height:54px}
.brand{font-family:var(--ff-disp);font-weight:800;font-size:1.1rem;color:#fff}.brand b{color:var(--gold)}
.phase-chip{font-family:var(--ff-mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid;transition:.3s}
.btn-back{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--mut);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.78rem;font-family:var(--ff-body);transition:.15s;text-decoration:none}
.btn-back:hover{border-color:rgba(245,158,11,.5);color:var(--gold)}

/* PROGRESS (hidden on selector) */
.prog-wrap{padding:10px 20px 0;position:relative;z-index:1}
.prog-labels{display:flex;justify-content:space-between;font-family:var(--ff-mono);font-size:.62rem;color:var(--mut);margin-bottom:5px}
.prog-bar{height:4px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .4s ease,background .4s ease}

/* SCREENS */
.screen{display:none;position:relative;z-index:1}
.screen.active{display:block}

/* ─── SELECTOR ─── */
#screen-select{max-width:540px;margin:0 auto;padding:28px 20px 60px}
.sel-eyebrow{font-family:var(--ff-mono);font-size:.63rem;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.sel-title{font-size:1.3rem;margin-bottom:6px}
.sel-sub{font-size:.83rem;color:var(--mut);margin-bottom:24px;line-height:1.5}
.mission-picks{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.mpick{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:13px;border:1.5px solid var(--line);background:rgba(20,34,64,.8);cursor:pointer;transition:.15s;user-select:none}
.mpick:hover{border-color:rgba(255,255,255,.2);background:rgba(20,34,64,.95)}
.mpick.on{border-color:var(--pick-color,var(--gold));background:rgba(var(--pick-rgb,245,158,11),.07)}
.mpick-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;font-size:.75rem}
.mpick.on .mpick-chk{border-color:var(--pick-color);background:var(--pick-color);color:#fff}
.mpick-ico{font-size:1.35rem;flex-shrink:0}
.mpick-info{flex:1;min-width:0}
.mpick-label{font-family:var(--ff-disp);font-weight:700;color:#fff;font-size:.93rem}
.mpick-desc{font-size:.75rem;color:var(--mut);margin-top:2px}
.mpick-nq{font-family:var(--ff-mono);font-size:.62rem;color:var(--mut);margin-left:auto;flex-shrink:0}
.btn-start{width:100%;padding:15px;border-radius:13px;background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;color:#0a1628;font-family:var(--ff-disp);font-weight:800;font-size:1rem;cursor:pointer;transition:.15s;box-shadow:0 4px 16px rgba(245,158,11,.3)}
.btn-start:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(245,158,11,.4)}
.btn-start:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

/* ─── WIZARD ─── */
#screen-wizard{max-width:520px;margin:0 auto;padding:28px 20px 48px;min-height:calc(100vh - 108px);display:none;flex-direction:column;justify-content:center}
#screen-wizard.active{display:flex}
.mission-header{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.mission-header-ico{font-size:1.4rem}
.mission-header-label{font-family:var(--ff-mono);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700}
.domaine{font-family:var(--ff-mono);font-size:.63rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;opacity:.85}
.q-text{font-family:var(--ff-disp);font-size:1.18rem;font-weight:700;color:#fff;line-height:1.4;margin-bottom:22px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{padding:14px 18px;border-radius:13px;border:1.5px solid var(--line);background:rgba(20,34,64,.85);color:var(--mut-2);font-size:.92rem;text-align:left;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:12px;width:100%;font-family:var(--ff-body)}
.opt:hover{border-color:rgba(255,255,255,.25);background:rgba(20,34,64,.98);color:#fff}
.opt.sel-ok{border-color:var(--ok);background:rgba(34,197,94,.1);color:#86efac}
.opt.sel-warn{border-color:var(--warn);background:rgba(245,158,11,.1);color:var(--gold)}
.opt.sel-alert{border-color:var(--alert);background:rgba(255,77,94,.1);color:#fca5a5}
.opt-ico{font-size:1.1rem;flex-shrink:0;width:26px;text-align:center}
.wiz-prev{margin-top:22px;background:transparent;border:none;color:var(--mut);font-size:.82rem;font-family:var(--ff-body);cursor:pointer;padding:6px 0;display:flex;align-items:center;gap:6px;transition:.12s}
.wiz-prev:hover{color:#fff}
.wiz-prev:disabled{opacity:.2;cursor:not-allowed}

/* ─── RESULTS ─── */
#screen-results{max-width:520px;margin:0 auto;padding:28px 20px 60px;text-align:center}
.results-title{font-family:var(--ff-mono);font-size:.63rem;letter-spacing:.15em;color:var(--ok);text-transform:uppercase;margin-bottom:12px}
.scores-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:22px;text-align:left}
.score-row{background:rgba(20,34,64,.8);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.score-row-ico{font-size:1.3rem;flex-shrink:0}
.score-row-info{flex:1;min-width:0}
.score-row-label{font-family:var(--ff-disp);font-weight:700;color:#fff;font-size:.9rem;margin-bottom:5px}
.score-bar-wrap{height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-bottom:3px}
.score-bar-fill{height:100%;border-radius:99px;transition:width .6s ease}
.score-row-pct{font-family:var(--ff-mono);font-size:.72rem;font-weight:700;flex-shrink:0}
.risk-tag{display:inline-block;font-family:var(--ff-mono);font-size:.72rem;padding:2px 9px;border-radius:99px;border:1px solid}
.btn-pdf{width:100%;padding:14px;border-radius:13px;background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;color:#0a1628;font-family:var(--ff-disp);font-weight:800;font-size:.95rem;cursor:pointer;transition:.15s;box-shadow:0 4px 16px rgba(245,158,11,.3);margin-bottom:10px}
.btn-pdf:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(245,158,11,.4)}
.btn-rst{width:100%;padding:11px;border-radius:11px;border:1px solid var(--line);background:transparent;color:var(--mut);font-family:var(--ff-body);font-size:.85rem;cursor:pointer;transition:.12s}
.btn-rst:hover{border-color:var(--gold);color:var(--gold)}

/* ─── MODAL PDF ─── */
.modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
@media(min-width:500px){.modal{align-items:center}}
.modal-box{background:#0f1e3d;border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;max-width:460px;padding:22px 20px 36px;max-height:92vh;overflow-y:auto}
@media(min-width:500px){.modal-box{border-radius:20px}}
.modal-title{font-family:var(--ff-disp);font-size:1rem;color:#fff;margin-bottom:3px}
.modal-sub{font-size:.78rem;color:var(--mut);margin-bottom:18px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.field label{font-size:.7rem;color:var(--mut);font-family:var(--ff-mono);letter-spacing:.05em}
.field input{background:rgba(0,0,0,.35);border:1.5px solid var(--line);border-radius:9px;padding:10px 13px;color:#fff;font-family:var(--ff-body);font-size:.88rem;transition:.15s}
.field input:focus{outline:none;border-color:var(--gold)}
.consent{display:flex;align-items:flex-start;gap:10px;padding:12px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:10px;margin-bottom:16px;cursor:pointer;font-size:.78rem;color:var(--mut-2);line-height:1.5}
.consent input[type=checkbox]{width:18px;height:18px;flex-shrink:0;margin-top:1px;accent-color:var(--gold);cursor:pointer}
.btn-gen{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;color:#0a1628;font-family:var(--ff-disp);font-weight:800;font-size:.9rem;cursor:pointer;transition:.15s;margin-bottom:8px}
.btn-gen:hover{transform:translateY(-1px)}
.btn-gen:disabled{opacity:.38;cursor:not-allowed;transform:none}
.btn-cancel{width:100%;padding:9px;border-radius:9px;border:1px solid var(--line);background:transparent;color:var(--mut);font-family:var(--ff-body);font-size:.82rem;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:20px;right:16px;z-index:500;padding:10px 15px;border-radius:10px;font-size:.82rem;font-weight:600;transform:translateY(16px);opacity:0;transition:.22s;pointer-events:none;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.4);color:#86efac}
.toast.err{background:rgba(255,77,94,.15);border:1px solid rgba(255,77,94,.4);color:#fca5a5}
.toast.info{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);color:var(--gold)}
</style>
</head>
<body style="display:flex;flex-direction:column;min-height:100vh">

<div class="topbar">
  <div class="brand">S<b>@</b>FE</div>
  <span class="phase-chip" id="phase-chip" style="color:var(--gold);border-color:rgba(245,158,11,.35)">Sélection</span>
  <a class="btn-back" href="/prospection-terrain/">← Retour</a>
</div>

<div class="prog-wrap" id="prog-wrap" style="display:none">
  <div class="prog-labels">
    <span id="prog-label">—</span>
    <span id="prog-pct">0 %</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<!-- ═══ SÉLECTEUR ═══ -->
<div class="screen active" id="screen-select">
  <div style="max-width:540px;margin:0 auto;padding:28px 20px 60px">
    <div class="sel-eyebrow">Audit prospect</div>
    <h2 class="sel-title">Choisissez les audits à réaliser</h2>
    <p class="sel-sub">Cochez avec votre prospect les domaines à évaluer. Chaque audit est gratuit et sans engagement.</p>

    <div class="mission-picks" id="picks-container">
      <!-- généré par JS -->
    </div>

    <button class="btn-start" id="btn-start" onclick="startAudit()" disabled>Démarrer les audits →</button>
  </div>
</div>

<!-- ═══ WIZARD ═══ -->
<div class="screen" id="screen-wizard">
  <div class="mission-header" id="mission-header">
    <span class="mission-header-ico" id="mh-ico"></span>
    <div>
      <div class="mission-header-label" id="mh-label"></div>
    </div>
  </div>
  <div class="domaine" id="q-domaine"></div>
  <div class="q-text" id="q-text"></div>
  <div class="opts" id="q-opts"></div>
  <button class="wiz-prev" id="btn-prev" onclick="goBack()">← Question précédente</button>
</div>

<!-- ═══ RÉSULTATS ═══ -->
<div class="screen" id="screen-results">
  <div style="max-width:520px;margin:0 auto;padding:28px 20px 60px;text-align:center">
    <div class="results-title">✓ Audits terminés</div>
    <h2 style="font-size:1.2rem;margin-bottom:20px">Résultats par domaine</h2>
    <div class="scores-grid" id="scores-grid"></div>
    <button class="btn-pdf" onclick="openModal()">📄 Générer le rapport PDF multi-audits</button>
    <button class="btn-rst" onclick="restartAll()">↺ Nouveau diagnostic</button>
  </div>
</div>

<!-- ═══ MODAL PDF ═══ -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-title">📄 Rapport Multi-Audits</div>
    <div class="modal-sub">Coordonnées du prospect — requis pour le rapport</div>
    <div class="field"><label>NOM PRÉNOM *</label><input id="f-nom" type="text" placeholder="Marie Dupont" autocomplete="name"></div>
    <div class="field"><label>ENTREPRISE</label><input id="f-ent" type="text" placeholder="Dupont SAS" autocomplete="organization"></div>
    <div class="field"><label>E-MAIL *</label><input id="f-email" type="email" placeholder="contact@entreprise.fr" autocomplete="email"></div>
    <div class="field"><label>TÉLÉPHONE</label><input id="f-tel" type="tel" placeholder="06 12 34 56 78" autocomplete="tel"></div>
    <label class="consent">
      <input type="checkbox" id="f-rgpd">
      <span>J'autorise S@FE à conserver mes coordonnées dans le cadre de ce diagnostic. Données non transmises à des tiers (Art. 13 RGPD).</span>
    </label>
    <button class="btn-gen" id="btn-gen" onclick="genPDF()">📥 Télécharger le rapport PDF</button>
    <button class="btn-cancel" onclick="closeModal()">Annuler</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   DONNÉES MISSIONS
═══════════════════════════════════════════════════ */
const MISSIONS = [
  {
    id:'rgpd', label:'Audit RGPD', icon:'⚖️', color:'#8b5cf6', rgb:'139,92,246',
    desc:'Conformité & protection des données',
    questions:[
      {id:'r1',dom:'👤 Gouvernance',q:"Avez-vous désigné un responsable de la protection des données ?",
       opts:[{ico:'✅',l:"Oui, c'est formalisé",r:'ok'},{ico:'⚠️',l:"Informellement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'r2',dom:'📋 Traitements',q:"Savez-vous quelles données personnelles vous collectez et pourquoi ?",
       opts:[{ico:'✅',l:"Oui, tout est documenté",r:'ok'},{ico:'⚠️',l:"Partiellement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'r3',dom:'📁 Registre Art. 30',q:"Disposez-vous d'un registre des activités de traitement (obligatoire CNIL) ?",
       opts:[{ico:'✅',l:"Oui, à jour",r:'ok'},{ico:'⚠️',l:"Incomplet ou obsolète",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'r4',dom:'🔔 Information',q:"Vos clients et prospects sont-ils informés de l'utilisation de leurs données ?",
       opts:[{ico:'✅',l:"Oui, mentions légales conformes",r:'ok'},{ico:'⚠️',l:"Partiellement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'r5',dom:'✋ Droits',q:"En cas de demande d'accès ou suppression de données, savez-vous quoi faire ?",
       opts:[{ico:'✅',l:"Oui, procédure en place",r:'ok'},{ico:'⚠️',l:"Approximativement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'r6',dom:'🔒 Sécurité',q:"Vos données clients sont-elles sauvegardées et sécurisées ?",
       opts:[{ico:'✅',l:"Oui",r:'ok'},{ico:'⚠️',l:"Partiellement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'r7',dom:'🌐 Cookies',q:"Votre site web affiche-t-il un bandeau de consentement aux cookies conforme CNIL ?",
       opts:[{ico:'✅',l:"Oui, conforme",r:'ok'},{ico:'⚠️',l:"Pas tout à fait",r:'warn'},{ico:'❌',l:"Non / pas de site",r:'alert'}]},
    ]
  },
  {
    id:'seo', label:'Audit SEO Local', icon:'📍', color:'#22c55e', rgb:'34,197,94',
    desc:'Visibilité Google & référencement local',
    questions:[
      {id:'s1',dom:'📍 Google Business',q:"Avez-vous revendiqué et vérifié votre fiche Google Business (GMB) ?",
       opts:[{ico:'✅',l:"Oui, vérifiée",r:'ok'},{ico:'⚠️',l:"Créée mais non vérifiée",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'s2',dom:'ℹ️ Informations',q:"Vos informations sont-elles à jour sur Google (horaires, téléphone, site) ?",
       opts:[{ico:'✅',l:"Oui, tout est à jour",r:'ok'},{ico:'⚠️',l:"Partiellement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'s3',dom:'⭐ Avis clients',q:"Avez-vous des avis Google et y répondez-vous régulièrement ?",
       opts:[{ico:'✅',l:"Oui, avis & réponses réguliers",r:'ok'},{ico:'⚠️',l:"Quelques avis, peu de réponses",r:'warn'},{ico:'❌',l:"Peu ou pas d'avis",r:'alert'}]},
      {id:'s4',dom:'📢 Publications',q:"Publiez-vous des posts et offres sur Google Business ?",
       opts:[{ico:'✅',l:"Oui, régulièrement",r:'ok'},{ico:'⚠️',l:"Occasionnellement",r:'warn'},{ico:'❌',l:"Jamais",r:'alert'}]},
      {id:'s5',dom:'🌐 Site web local',q:"Votre site web est-il optimisé pour la recherche locale (nom ville + activité) ?",
       opts:[{ico:'✅',l:"Oui, pages locales dédiées",r:'ok'},{ico:'⚠️',l:"Partiellement",r:'warn'},{ico:'❌',l:"Non / pas de site",r:'alert'}]},
      {id:'s6',dom:'📊 Suivi de positions',q:"Connaissez-vous vos positions Google sur vos mots-clés locaux ?",
       opts:[{ico:'✅',l:"Oui, suivi mensuel",r:'ok'},{ico:'⚠️',l:"Vaguement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
    ]
  },
  {
    id:'cyber', label:'Audit Cybersécurité', icon:'🛡️', color:'#06b6d4', rgb:'6,182,212',
    desc:'Diagnostic vulnérabilités & sécurité ANSSI',
    questions:[
      {id:'c1',dom:'👤 Gouvernance',q:"Un responsable de la sécurité informatique est-il désigné ?",
       opts:[{ico:'✅',l:"Oui, formalisé",r:'ok'},{ico:'⚠️',l:"Informellement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'c2',dom:'🔑 Authentification',q:"L'authentification à deux facteurs (MFA) est-elle activée sur vos comptes critiques ?",
       opts:[{ico:'✅',l:"Oui, sur tous les comptes admin",r:'ok'},{ico:'⚠️',l:"Partiellement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'c3',dom:'💻 Postes de travail',q:"Vos postes et serveurs sont-ils à jour (OS, logiciels, antivirus) ?",
       opts:[{ico:'✅',l:"Oui, mises à jour automatiques",r:'ok'},{ico:'⚠️',l:"Manuellement / irrégulièrement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'c4',dom:'📡 Réseau',q:"Le Wi-Fi professionnel est-il séparé du réseau invités / clients ?",
       opts:[{ico:'✅',l:"Oui, réseaux distincts",r:'ok'},{ico:'⚠️',l:"Même réseau",r:'warn'},{ico:'❌',l:"Pas de Wi-Fi",r:'ok'}]},
      {id:'c5',dom:'💾 Sauvegardes',q:"Des sauvegardes régulières sont-elles réalisées et testées ?",
       opts:[{ico:'✅',l:"Oui, avec test de restauration",r:'ok'},{ico:'⚠️',l:"Sauvegardes sans test",r:'warn'},{ico:'❌',l:"Non / irrégulières",r:'alert'}]},
      {id:'c6',dom:'🎣 Phishing',q:"Vos équipes ont-elles été sensibilisées aux tentatives de phishing ?",
       opts:[{ico:'✅',l:"Oui, formation réalisée",r:'ok'},{ico:'⚠️',l:"Information ponctuelle",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'c7',dom:'🌐 Sécurité web',q:"Votre site web est-il en HTTPS avec un certificat SSL valide ?",
       opts:[{ico:'✅',l:"Oui, note A/A+",r:'ok'},{ico:'⚠️',l:"HTTPS mais certificat faible",r:'warn'},{ico:'❌',l:"Non / HTTP",r:'alert'}]},
    ]
  },
  {
    id:'social', label:'Audit Social', icon:'📱', color:'#a855f7', rgb:'168,85,247',
    desc:'Présence & stratégie réseaux sociaux',
    questions:[
      {id:'so1',dom:'📱 Présence',q:"Êtes-vous présent sur au moins un réseau social professionnel (Facebook, Instagram, LinkedIn…) ?",

      {id:'so3',dom:'💬 Engagement',q:"Répondez-vous aux commentaires, messages et avis de vos clients en ligne ?",

      {id:'so5',dom:'📊 Statistiques',q:"Analysez-vous vos statistiques (portée, engagement, abonnés) ?",
       opts:[{ico:'✅',l:"Oui, analyse mensuelle",r:'ok'},{ico:'⚠️',l:"De temps en temps",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
    ]
  },
  {
    id:'clickcollect', label:'Audit Click & Collect', icon:'🛒', color:'#ec4899', rgb:'236,72,153',
    desc:'Commande en ligne & vente digitale',
    questions:[
      {id:'cc1',dom:'🛒 Commande en ligne',q:"Vos clients peuvent-ils commander ou réserver vos produits/services en ligne ?",
       opts:[{ico:'✅',l:"Oui, système en place",r:'ok'},{ico:'⚠️',l:"Partiellement (formulaire simple)",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'cc2',dom:'📦 Catalogue',q:"Avez-vous un catalogue produits accessible en ligne (site, GMB, réseaux sociaux) ?",
       opts:[{ico:'✅',l:"Oui, avec prix et photos",r:'ok'},{ico:'⚠️',l:"Partiel ou sans prix",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'cc3',dom:'📊 Stocks',q:"Gérez-vous vos stocks de manière numérique (logiciel, tableau de bord) ?",
       opts:[{ico:'✅',l:"Oui, logiciel dédié",r:'ok'},{ico:'⚠️',l:"Fichier Excel / Google Sheets",r:'warn'},{ico:'❌',l:"Non, tout en tête",r:'alert'}]},
      {id:'cc4',dom:'🏪 Retrait boutique',q:"Proposez-vous explicitement un retrait en boutique pour les commandes en ligne ?",
       opts:[{ico:'✅',l:"Oui, option clairement affichée",r:'ok'},{ico:'⚠️',l:"Sur demande seulement",r:'warn'},{ico:'❌',l:"Non",r:'alert'}]},
      {id:'cc5',dom:'⚙️ Gestion commandes',q:"Utilisez-vous un logiciel de caisse ou de gestion des commandes ?",
       opts:[{ico:'✅',l:"Oui, logiciel complet",r:'ok'},{ico:'⚠️',l:"Logiciel basique",r:'warn'},{ico:'❌',l:"Non, saisie manuelle",r:'alert'}]},
    ]
  },
];

/* Score weights */
const W = {ok:2, warn:1, alert:0};

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let selected = [];       // mission ids in order
let mIdx = 0;            // current mission index in selected[]
let qIdx = 0;            // current question index in current mission
let allAnswers = {};     // { missionId: { questionId: {r,l} } }

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
function init(){
  const container = document.getElementById('picks-container');
  container.innerHTML = MISSIONS.map(m => `
    <div class="mpick" id="pick-${m.id}" onclick="toggleMission('${m.id}')"
      style="--pick-color:${m.color};--pick-rgb:${m.rgb}">
      <div class="mpick-chk" id="chk-${m.id}"></div>
      <span class="mpick-ico">${m.icon}</span>
      <div class="mpick-info">
        <div class="mpick-label">${m.label}</div>
        <div class="mpick-desc">${m.desc}</div>
      </div>
      <span class="mpick-nq">${m.questions.length} questions</span>
    </div>`).join('');
}

function toggleMission(id){
  const el = document.getElementById(`pick-${id}`);
  const chk = document.getElementById(`chk-${id}`);
  const idx = selected.indexOf(id);
  if(idx===-1){
    selected.push(id);
    el.classList.add('on');
    chk.textContent='✓';
  } else {
    selected.splice(idx,1);
    el.classList.remove('on');
    chk.textContent='';
  }
  document.getElementById('btn-start').disabled = selected.length===0;
}

/* ═══════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════ */
function startAudit(){
  if(!selected.length) return;
  mIdx=0; qIdx=0;
  selected.forEach(id=>{ allAnswers[id]={}; });
  switchScreen('wizard');
  renderQuestion();
}

function renderQuestion(){
  const mission = MISSIONS.find(m=>m.id===selected[mIdx]);
  if(!mission) return showResults();

  const q = mission.questions[qIdx];
  if(!q) return showResults();

  // Update topbar chip
  const chip = document.getElementById('phase-chip');
  chip.textContent=`${mission.icon} ${mission.label}`;
  chip.style.color=mission.color;
  chip.style.borderColor=`rgba(${mission.rgb},.35)`;

  // Update progress
  const totalQ = selected.reduce((s,id)=>s+MISSIONS.find(m=>m.id===id).questions.length,0);
  const doneQ = selected.slice(0,mIdx).reduce((s,id)=>s+MISSIONS.find(m=>m.id===id).questions.length,0)+qIdx;
  const pct = Math.round(doneQ/totalQ*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-fill').style.background=`linear-gradient(90deg,${mission.color},${mission.color}cc)`;
  document.getElementById('prog-label').textContent=`${mission.label} — Q${qIdx+1}/${mission.questions.length}`;
  document.getElementById('prog-pct').textContent=pct+' %';

  // Mission header (shown inside wizard)
  document.getElementById('mh-ico').textContent=mission.icon;
  document.getElementById('mh-label').textContent=`${mission.label} · Audit ${mIdx+1}/${selected.length}`;
  document.getElementById('mh-label').style.color=mission.color;

  // Domaine + question
  document.getElementById('q-domaine').textContent=q.dom;
  document.getElementById('q-domaine').style.color=mission.color;
  document.getElementById('q-text').textContent=q.q;

  // Options
  const opts = document.getElementById('q-opts');
  opts.innerHTML = q.opts.map((o,i)=>`
    <button class="opt" id="opt-${i}" onclick="pick(${i},'${o.r}',\`${o.l}\`)">
      <span class="opt-ico">${o.ico}</span><span>${o.l}</span>
    </button>`).join('');

  // Restore previous answer if any
  const saved = allAnswers[mission.id]?.[q.id];
  if(saved){
    q.opts.forEach((_,i)=>{
      if(q.opts[i].l===saved.l){
        document.getElementById(`opt-${i}`)?.classList.add('sel-'+saved.r);
      }
    });
  }

  // Prev button
  document.getElementById('btn-prev').disabled = (mIdx===0 && qIdx===0);
}

function pick(optIdx, risk, label){
  const mission = MISSIONS.find(m=>m.id===selected[mIdx]);
  const q = mission.questions[qIdx];
  allAnswers[mission.id][q.id]={r:risk,l:label,q:q.q};

  // Mark selection
  document.querySelectorAll('.opt').forEach(el=>el.classList.remove('sel-ok','sel-warn','sel-alert'));
  document.getElementById(`opt-${optIdx}`)?.classList.add('sel-'+risk);

  // Auto-advance
  setTimeout(()=>{
    const isLastQ = qIdx===mission.questions.length-1;
    const isLastM = mIdx===selected.length-1;
    if(isLastQ&&isLastM){ showResults(); }
    else if(isLastQ){ mIdx++; qIdx=0; renderQuestion(); }
    else{ qIdx++; renderQuestion(); }
  }, 380);
}

function goBack(){
  if(qIdx>0){ qIdx--; renderQuestion(); return; }
  if(mIdx>0){ mIdx--; qIdx=MISSIONS.find(m=>m.id===selected[mIdx]).questions.length-1; renderQuestion(); return; }
}

/* ═══════════════════════════════════════════════════
   RESULTS
═══════════════════════════════════════════════════ */
function showResults(){
  switchScreen('results');
  const chip = document.getElementById('phase-chip');
  chip.textContent='Résultats';
  chip.style.color='var(--ok)';
  chip.style.borderColor='rgba(34,197,94,.35)';
  document.getElementById('prog-wrap').style.display='none';

  const grid = document.getElementById('scores-grid');
  grid.innerHTML = selected.map(id=>{
    const m = MISSIONS.find(x=>x.id===id);
    const ans = allAnswers[id]||{};
    const total = Object.values(ans).reduce((s,a)=>s+(W[a.r]||0),0);
    const max = m.questions.length*2;
    const pct = max>0?Math.round(total/max*100):0;
    const {col,label,bg} = riskInfo(pct);
    return `<div class="score-row">
      <span class="score-row-ico">${m.icon}</span>
      <div class="score-row-info">
        <div class="score-row-label">${m.label}</div>
        <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${pct}%;background:${m.color}"></div></div>
        <span class="risk-tag" style="color:${col};border-color:${col};background:${bg}">${label}</span>
      </div>
      <span class="score-row-pct" style="color:${m.color}">${pct}%</span>
    </div>`;
  }).join('');
}

function riskInfo(pct){
  if(pct>=80) return {col:'#86efac',label:'Conforme ✅',bg:'rgba(34,197,94,.1)'};
  if(pct>=60) return {col:'#fbbf24',label:'Risque modéré ⚠️',bg:'rgba(245,158,11,.1)'};
  if(pct>=40) return {col:'#fca5a5',label:'Risque élevé 🔴',bg:'rgba(255,77,94,.1)'};
  return {col:'#fca5a5',label:'Critique 🚨',bg:'rgba(255,77,94,.15)'};
}

/* ═══════════════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════════════ */
function switchScreen(name){
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(name==='wizard'){
    document.getElementById('prog-wrap').style.display='block';
  }
}

function restartAll(){
  selected=[]; mIdx=0; qIdx=0; allAnswers={};
  document.querySelectorAll('.mpick').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.mpick-chk').forEach(el=>el.textContent='');
  document.getElementById('btn-start').disabled=true;
  const chip=document.getElementById('phase-chip');
  chip.textContent='Sélection';chip.style.color='var(--gold)';chip.style.borderColor='rgba(245,158,11,.35)';
  document.getElementById('prog-wrap').style.display='none';
  switchScreen('select');
}

/* ═══════════════════════════════════════════════════
   PDF
═══════════════════════════════════════════════════ */
function openModal(){ document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

function genPDF(){
  const nom   = document.getElementById('f-nom').value.trim();
  const email = document.getElementById('f-email').value.trim();

  const tel   = document.getElementById('f-tel').value.trim();
  const rgpd  = document.getElementById('f-rgpd').checked;
  if(!nom||!email){ showToast('Nom et e-mail obligatoires','err'); return; }
  if(!rgpd){ showToast('Consentement RGPD requis','err'); return; }

  const now = new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  const commercial = 'S@FE';

  const missionBlocks = selected.map(id=>{
    const m = MISSIONS.find(x=>x.id===id);
    const ans = allAnswers[id]||{};
    const total = Object.values(ans).reduce((s,a)=>s+(W[a.r]||0),0);
    const max = m.questions.length*2;
    const pct = max>0?Math.round(total/max*100):0;
    const {label} = riskInfo(pct);

    const rows = m.questions.map(q=>{

        ?`<span style="background:#fef3c7;color:#92400e;padding:2px 9px;border-radius:99px;font-size:11px">⚠️ Partiel</span>`
        :`<span style="background:#fee2e2;color:#991b1b;padding:2px 9px;border-radius:99px;font-size:11px">❌ Non conforme</span>`;
      return `<tr><td style="padding:8px 10px;border-bottom:1px solid #f3f4f6;font-size:12px;width:55%">${q.q}</td>

    }).join('');

    const scoreColor = pct>=80?'#166534':pct>=60?'#92400e':pct>=40?'#991b1b':'#7f1d1d';
    const scoreBg = pct>=80?'#f0fdf4':pct>=60?'#fffbeb':'#fef2f2';

    return `

          <h2 style="font-size:14px;font-weight:700;color:${m.color};margin:0">${m.label}</h2>
          <div style="margin-left:auto;text-align:right">
            <div style="font-size:22px;font-weight:900;color:${scoreColor}">${pct}%</div>
            <div style="font-size:11px;color:#6b7280">${label}</div>
          </div>
        </div>
        <div style="background:${scoreBg};border:1px solid ${scoreBorder};border-radius:8px;height:8px;overflow:hidden;margin-bottom:12px">
          <div style="height:100%;width:${pct}%;background:${scoreBorder}"></div>
        </div>
        <table style="width:100%;border-collapse:collapse">
          <thead><tr>
            <th style="background:${m.color};color:#fff;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px">Question</th>
            <th style="background:${m.color};color:#fff;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px">Réponse</th>
            <th style="background:${m.color};color:#fff;padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.5px">Statut</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }).join('');

  const summary = selected.map(id=>{
    const m=MISSIONS.find(x=>x.id===id);
    const ans=allAnswers[id]||{};
    const total=Object.values(ans).reduce((s,a)=>s+(W[a.r]||0),0);
    const max=m.questions.length*2;
    const pct=max>0?Math.round(total/max*100):0;
    const {label}=riskInfo(pct);
    const scoreColor=pct>=80?'#166534':pct>=60?'#92400e':pct>=40?'#991b1b':'#7f1d1d';
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f3f4f6">
      <span style="font-size:18px">${m.icon}</span>
      <span style="font-size:13px;font-weight:600;flex:1">${m.label}</span>
      <span style="font-size:16px;font-weight:900;color:${scoreColor}">${pct}%</span>
      <span style="font-size:11px;color:#6b7280">${label}</span>
    </div>`;
  }).join('');

  const html = `<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<title>Rapport Multi-Audits — ${nom}</title>
<style>
@page{margin:16mm 14mm}
body{font-family:Arial,Helvetica,sans-serif;color:#1f2937;line-height:1.5;font-size:13px}

  const w=window.open('','_blank');

  w.onload=()=>w.print();

   UTILS
═══════════════════════════════════════════════════ */
let _tt;
function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  clearTimeout(_tt);
  t.textContent=msg; t.className='toast '+type+' show';
  _tt=setTimeout(()=>t.classList.remove('show'),2800);
}

init();
</script>
