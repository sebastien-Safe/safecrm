<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https:; frame-src https://calendar.google.com;">
  <meta name="referrer" content="strict-origin-when-cross-origin">

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prendre rendez-vous — S@FE</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://calendar.google.com/calendar/scheduling-button-script.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--navy-mid:#142240;--gold:#f59e0b;
  --mut:#94a3b8;--r:12px;--ff:'IBM Plex Sans',system-ui,sans-serif;
}
body{font-family:var(--ff);background:var(--navy);color:#fff;min-height:100vh;padding:0 0 60px}

.header{background:var(--navy-mid);padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.07)}
.logo{font-size:22px;font-weight:900;letter-spacing:-1px}.logo b{color:var(--gold)}
.logo small{display:block;font-size:9px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;font-weight:400;margin-top:1px}

.container{max-width:600px;margin:0 auto;padding:28px 16px;text-align:center}
h1{font-size:20px;font-weight:700;margin-bottom:6px}
.sub{color:var(--mut);font-size:13px;margin-bottom:28px}

.card{background:#0f1f3d;border-radius:var(--r);padding:32px 20px}

.no-slots{color:var(--mut);font-size:13px;text-align:center;padding:16px 0}
</style>
</head>
<body>

<div class="header">
  <div class="logo">S<b>@</b>FE<small>Safe Digitalisation</small></div>
  <div style="font-size:13px;color:var(--mut)">Prise de rendez-vous</div>
</div>

<div class="container">

  <div id="state-error" style="display:none;text-align:center;padding:60px 20px">
    <div style="font-size:40px;margin-bottom:16px">🔗</div>
    <h2 style="margin-bottom:8px">Lien invalide</h2>
    <p style="color:var(--mut);font-size:14px">Ce lien de réservation n'est pas valide ou a expiré.</p>
  </div>

  <div id="state-booking" style="display:none">
    <h1 id="commercial-name">Prendre rendez-vous</h1>
    <p class="sub">Choisissez un créneau disponible dans l'agenda ci-dessous</p>
    <div class="card">
      <div id="gcal-button-target"></div>
    </div>
  </div>

</div>

<script src="https://calendar.google.com/calendar/scheduling-button-script.js" async></script>
<script>
// L'URL Google Calendar transite en clair dans le lien partagé : c'est
// volontaire, une page de planification Google est prévue pour être
// publique (c'est exactement ce que le commercial partage à ses prospects).
// On valide simplement qu'il s'agit bien d'un lien de planification Google
// avant de le charger, pour éviter d'ouvrir ce bouton vers un domaine tiers.
const GOOGLE_BOOKING_URL_RE = /^https:\/\/calendar\.google\.com\/calendar\/appointments\/schedules\//;

function init() {
  const params = new URLSearchParams(location.search);
  const gcalUrl = params.get('gcal');
  const nom     = params.get('nom');

  if (!gcalUrl || !GOOGLE_BOOKING_URL_RE.test(gcalUrl)) {
    document.getElementById('state-error').style.display = 'block';
    return;
  }

  if (nom) {
    document.getElementById('commercial-name').textContent = `Rendez-vous avec ${nom}`;
    document.title = `RDV — ${nom} — S@FE`;
  }
  document.getElementById('state-booking').style.display = 'block';

  window.addEventListener('load', () => {
    calendar.schedulingButton.load({
      url: gcalUrl,
      color: '#f59e0b',
      label: 'Réserver un rendez-vous',
      target: document.getElementById('gcal-button-target'),
    });
  });
}

init();
</script>
</body>
</html>
