<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>S@FE Work — Mission Cybersécurité</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/favicon.ico" sizes="any">
<style>
:root{
  --navy:#0a1628;--navy-mid:#142240;--line:rgba(255,255,255,.08);
  --mut:#94a3b8;--mut-2:#cbd5e1;--accent:#3b82f6;--accent-2:#2563eb;
  --gold:#f59e0b;--ok:#22c55e;--alert:#ff4d5e;--warn:#f59e0b;
  --red:#ef4444;--orange:#f97316;--cyber:#06b6d4;
  --r:14px;--ff-disp:'Sora',sans-serif;--ff-body:'IBM Plex Sans',sans-serif;--ff-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff-body);background:var(--navy);color:var(--mut-2);min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(800px 500px at 85% 0%,rgba(6,182,212,.12),transparent 60%),
    radial-gradient(600px 400px at 0% 40%,rgba(239,68,68,.07),transparent 55%),
    linear-gradient(180deg,var(--navy),var(--navy-mid));}
h1,h2,h3,h4{font-family:var(--ff-disp);color:#fff;line-height:1.15;letter-spacing:-.02em}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);background:rgba(10,17,36,.88);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 24px;height:60px}
.brand{font-family:var(--ff-disp);font-weight:800;font-size:1.2rem;color:#fff}.brand b{color:var(--gold)}
.mission-label{font-family:var(--ff-mono);font-size:.7rem;letter-spacing:.15em;color:var(--cyber);text-transform:uppercase;border:1px solid rgba(6,182,212,.35);padding:3px 10px;border-radius:20px}
.topbar-formule{font-family:var(--ff-mono);font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid rgba(6,182,212,.3);color:var(--cyber);display:none}
.topbar-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.btn-back{background:transparent;border:1px solid var(--line);color:var(--mut);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.8rem;font-family:var(--ff-body);transition:.15s}
.btn-back:hover{border-color:var(--cyber);color:var(--cyber)}

.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 24px}

/* CLIENT HERO */
.client-hero{background:rgba(20,34,64,.8);border:1px solid var(--line);border-radius:var(--r);padding:20px 24px;display:flex;align-items:center;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.client-avatar{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,#164e63,var(--cyber));display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.client-info h2{font-size:1.1rem;margin-bottom:2px}
.client-info .sub{font-size:.82rem;color:var(--mut)}
.client-meta{display:flex;gap:22px;flex-wrap:wrap}
.cmi .lbl{font-family:var(--ff-mono);font-size:.63rem;letter-spacing:.1em;color:var(--mut);text-transform:uppercase;display:block}
.cmi .val{font-size:.85rem;color:#fff;font-weight:500}

/* FORMULE INFO */
.formule-info{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.2);border-radius:var(--r);padding:16px 20px;margin-bottom:22px;display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.formule-info .fi-label{font-family:var(--ff-mono);font-size:.63rem;letter-spacing:.12em;color:var(--cyber);text-transform:uppercase;margin-bottom:4px}
.formule-info h3{font-size:1rem;color:#fff;margin-bottom:6px}
.formule-info ul{list-style:none;display:flex;flex-direction:column;gap:3px}
.formule-info ul li{font-size:.8rem;color:var(--mut-2);display:flex;align-items:center;gap:7px}
.formule-info ul li::before{content:"✓";color:var(--cyber);font-weight:700;font-size:.75rem}
.fi-price{font-family:var(--ff-disp);font-size:1.3rem;font-weight:800;color:var(--gold);white-space:nowrap;text-align:right}
.fi-price small{font-size:.7rem;color:var(--mut);font-weight:400;display:block}

/* PROGRESS */
.progress-wrap{margin-bottom:22px}
.progress-labels{display:flex;justify-content:space-between;margin-bottom:6px;font-family:var(--ff-mono);font-size:.65rem;color:var(--mut)}
.progress-bar{background:rgba(255,255,255,.06);border-radius:99px;height:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--cyber),var(--ok));transition:width .4s ease}

/* STEP CARD */
.step-card{background:rgba(20,34,64,.7);border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-bottom:16px;position:relative;overflow:hidden;transition:.2s}
.step-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--step-color,var(--cyber));opacity:0;transition:.2s}
.step-card.active::before{opacity:1}
.step-card.done{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.04)}
.step-card.done::before{background:var(--ok);opacity:1}
.step-card.locked{opacity:.38;pointer-events:none}
.step-num{font-family:var(--ff-mono);font-size:.63rem;letter-spacing:.1em;color:var(--mut);margin-bottom:8px}
.step-title{font-size:.97rem;font-weight:700;color:#fff;margin-bottom:5px}
.step-desc{font-size:.8rem;color:var(--mut);margin-bottom:14px;line-height:1.5}
.step-result{margin-top:12px;padding:10px 12px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:8px;font-size:.78rem;color:#86efac;display:none}
.step-result.show{display:block}

/* BUTTONS */
.btn{font-family:var(--ff-disp);font-weight:700;font-size:.82rem;padding:8px 16px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-cyber{background:linear-gradient(135deg,#164e63,var(--cyber));color:#fff;box-shadow:0 3px 10px rgba(6,182,212,.25)}
.btn-cyber:hover{transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#fbbf24);color:#0a1628}
.btn-gold:hover{transform:translateY(-1px)}
.btn-ok{background:rgba(34,197,94,.1);color:var(--ok);border-color:rgba(34,197,94,.3)}
.btn-ok:hover{background:rgba(34,197,94,.2)}
.btn-out{background:transparent;color:var(--mut-2);border-color:var(--line)}
.btn-out:hover{border-color:var(--cyber);color:var(--cyber)}
.btn-alert{background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.3)}
.btn-alert:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:5px 11px;font-size:.75rem;border-radius:7px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

/* TOOLS GRID */
.tools-section{margin-bottom:14px}
.tools-cat{font-family:var(--ff-mono);font-size:.62rem;letter-spacing:.12em;color:var(--cyber);text-transform:uppercase;margin-bottom:6px;margin-top:12px}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.tool-card{display:flex;flex-direction:column;gap:3px;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.03);transition:.15s;text-decoration:none}
.tool-card:hover{border-color:var(--cyber);background:rgba(6,182,212,.07)}
.tool-card .tc-name{font-size:.82rem;font-weight:600;color:#fff;display:flex;align-items:center;gap:6px}
.tool-card .tc-desc{font-size:.72rem;color:var(--mut);line-height:1.35}
.tool-card .tc-tag{font-family:var(--ff-mono);font-size:.62rem;color:var(--cyber);margin-top:2px}

/* CHECKLIST */
.checklist{list-style:none;display:flex;flex-direction:column;gap:6px}
.checklist li{display:flex;align-items:flex-start;gap:10px;font-size:.83rem;padding:9px 12px;border-radius:8px;background:rgba(255,255,255,.03);cursor:pointer;transition:.15s;user-select:none;line-height:1.4}
.checklist li:hover{background:rgba(255,255,255,.06)}
.checklist li.checked{color:var(--ok)}
.chk{width:18px;height:18px;border-radius:5px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;font-size:.7rem;margin-top:1px}
.checklist li.checked .chk{background:var(--ok);border-color:var(--ok);color:#000}
.chk-sub{font-size:.74rem;color:var(--mut);display:block;margin-top:2px}

/* QCM */
.qcm-wrap{display:flex;flex-direction:column;gap:0}
.qcm-domain{font-family:var(--ff-mono);font-size:.65rem;letter-spacing:.12em;color:var(--cyber);text-transform:uppercase;padding:10px 0 6px;border-top:1px solid var(--line);margin-top:4px}
.qcm-domain:first-child{border-top:none;margin-top:0}
.qcm-item{border-bottom:1px solid rgba(255,255,255,.04);padding:12px 0}
.qcm-item:last-child{border-bottom:none}
.qcm-q{font-size:.87rem;color:#fff;font-weight:600;margin-bottom:9px;display:flex;gap:10px;align-items:flex-start}
.qnum{font-family:var(--ff-mono);font-size:.68rem;color:var(--cyber);background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.2);border-radius:6px;padding:2px 7px;flex-shrink:0;margin-top:1px}
.qcm-options{display:flex;flex-direction:column;gap:5px;padding-left:36px}
.qcm-option{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);cursor:pointer;transition:.15s;font-size:.82rem;color:var(--mut-2)}
.qcm-option:hover{border-color:var(--cyber);background:rgba(6,182,212,.06);color:#fff}
.qcm-option.sel-ok{border-color:var(--ok);background:rgba(34,197,94,.08);color:#86efac}
.qcm-option.sel-warn{border-color:var(--warn);background:rgba(245,158,11,.08);color:var(--gold)}
.qcm-option.sel-alert{border-color:var(--red);background:rgba(239,68,68,.08);color:#fca5a5}
.qcm-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;transition:.15s;display:flex;align-items:center;justify-content:center}
.qcm-option.sel-ok .qcm-radio{border-color:var(--ok)}.qcm-option.sel-ok .qcm-radio::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--ok);display:block}
.qcm-option.sel-warn .qcm-radio{border-color:var(--warn)}.qcm-option.sel-warn .qcm-radio::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--warn);display:block}
.qcm-option.sel-alert .qcm-radio{border-color:var(--red)}.qcm-option.sel-alert .qcm-radio::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--red);display:block}

/* SCORE BOARD */
.score-board{display:none;margin-top:14px;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:12px;padding:16px;gap:20px;flex-wrap:wrap}
.score-board.show{display:flex}
.score-global{text-align:center;min-width:100px}
.score-pct{font-family:var(--ff-disp);font-size:2.2rem;font-weight:800;line-height:1}
.score-lbl{font-size:.75rem;color:var(--mut);margin-top:4px}
.score-domains{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.domain-score{background:rgba(255,255,255,.04);border-radius:8px;padding:8px 10px}
.domain-score .ds-label{font-size:.73rem;color:var(--mut);margin-bottom:4px}
.domain-score .ds-bar{height:5px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:3px}
.domain-score .ds-fill{height:100%;border-radius:99px;transition:width .4s}
.domain-score .ds-val{font-family:var(--ff-mono);font-size:.72rem}

/* NOTES */
textarea.notes{width:100%;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:8px;padding:9px 12px;color:#fff;font-size:.82rem;font-family:var(--ff-body);resize:vertical;min-height:65px;margin-top:6px}
textarea.notes:focus{outline:none;border-color:var(--cyber)}
.field-label{font-family:var(--ff-mono);font-size:.63rem;letter-spacing:.1em;color:var(--mut);text-transform:uppercase;display:block;margin-bottom:3px;margin-top:10px}

/* RISK BADGE */
.risk-badge{display:inline-block;font-family:var(--ff-mono);font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px}
.risk-ok{background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.3)}
.risk-warn{background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.3)}
.risk-alert{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.risk-crit{background:rgba(239,68,68,.25);color:#f87171;border:2px solid rgba(239,68,68,.5)}

/* TOAST / SPINNER / LOADING */
.toast{position:fixed;bottom:24px;right:24px;z-index:500;padding:11px 16px;border-radius:11px;font-size:.83rem;font-weight:600;transform:translateY(16px);opacity:0;transition:.22s;pointer-events:none;max-width:340px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.4);color:#86efac}
.toast.err{background:rgba(255,77,94,.15);border:1px solid rgba(255,77,94,.4);color:#fca5a5}
.toast.info{background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.4);color:#67e8f9}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{position:fixed;inset:0;z-index:999;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-screen .sp{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--cyber);border-radius:50%;animation:spin .8s linear infinite}
.loading-screen p{color:var(--mut);font-size:.88rem}

/* SUMMARY */
.summary-box{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);border-radius:var(--r);padding:20px 24px;margin-top:28px;display:none}
.summary-box.show{display:block}
.summary-box h3{color:var(--ok);margin-bottom:12px}
.summary-box ul{list-style:none;display:flex;flex-direction:column;gap:5px}
.summary-box ul li::before{content:"✓ ";color:var(--ok);font-weight:700}
.summary-box ul li{font-size:.83rem}

/* SCAN RESULT */
.scan-result{background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:10px;font-family:var(--ff-mono);font-size:.75rem;line-height:1.7;color:var(--mut-2);display:none;max-height:160px;overflow-y:auto}
.scan-result.show{display:block}
</style>
</head>

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  const p=new URLSearchParams(location.search);
  const cid=p.get('contact'),ctid=p.get('contract');
  if(!cid||!ctid){document.getElementById('loading').innerHTML='<p style="color:var(--alert)">Paramètres manquants.</p>';return;}
  try{
    const token=localStorage.getItem('safe_work_token');
    if(token) H['Authorization']='Bearer '+token;
    const [contacts,contracts]=await Promise.all([
      sbGet('contacts',`id=eq.${cid}&select=*`),
      sbGet('contracts',`id=eq.${ctid}&select=*`)
    ]);
    contact=contacts[0]; contract=contracts[0];
    if(!contact||!contract) throw new Error('Données introuvables');
    render();
  }catch(e){
    document.getElementById('loading').innerHTML=`<p style="color:var(--alert)">Erreur : ${e.message}</p>`;
  }
}

async function sbGet(t,p){
  const r=await fetch(`${SB_URL}/rest/v1/${t}?${p}`,{headers:{...H,'Prefer':'return=representation'}});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

function toggleChk(i){
  const li=document.getElementById('chk-'+i);
  const ico=document.getElementById('chkico-'+i);
  li.classList.toggle('checked');
  ico.textContent=li.classList.contains('checked')?'✓':'';
}

function validateChecklist(total,force=false){
  let checked=0;
  for(let i=0;i<total;i++) if(document.getElementById('chk-'+i)?.classList.contains('checked')) checked++;
  if(!force&&checked<total){showToast(`${total-checked} tâche(s) non cochée(s)${''}`, 'info');return;}
  document.getElementById('result-1').textContent=`✓ Checklist : ${checked}/${total} tâches validées`;
  validateStep(1);
  summaryActions.push(`📋 Checklist mission : ${checked}/${total} tâches`);
}

function selectOpt(qid,idx,risk,domain){
  document.querySelectorAll(`[id^="opt-${qid}-"]`).forEach(el=>el.classList.remove('sel-ok','sel-warn','sel-alert'));
  const cls=risk==='ok'?'sel-ok':risk==='warn'?'sel-warn':'sel-alert';
  document.getElementById(`opt-${qid}-${idx}`).classList.add(cls);
  if(!qcmAnswers[domain]) qcmAnswers[domain]={};
  qcmAnswers[domain][qid]={idx,risk};
}

function validateQCM(totalQ){
  const allAnswered=Object.values(qcmAnswers).reduce((a,d)=>a+Object.keys(d).length,0);
  if(allAnswered<totalQ){showToast(`${totalQ-allAnswered} question(s) sans réponse`,'info');return;}

  // Score global
  let totalOk=0,totalWarn=0,totalAlert=0;
  const domainResults={};

  QCM_DOMAINS.forEach(d=>{
    const ans=qcmAnswers[d.id]||{};
    let ok=0,warn=0,alert=0;
    d.questions.forEach(q=>{
      const a=ans[q.id];
      if(!a) return;
      if(a.risk==='ok') ok++;
      else if(a.risk==='warn') warn++;
      else alert++;
    });
    const score=Math.round((ok*100+warn*50)/d.questions.length);
    domainResults[d.id]={score,ok,warn,alert,total:d.questions.length};
    totalOk+=ok; totalWarn+=warn; totalAlert+=alert;
  });

  const globalScore=Math.round((totalOk*100+totalWarn*50)/totalQ);
  const riskLabel=globalScore>=75?'Niveau acceptable':globalScore>=50?'Risque modéré':globalScore>=25?'Risque élevé':'Critique';
  const riskClass=globalScore>=75?'risk-ok':globalScore>=50?'risk-warn':'risk-alert';

  window._cyberScore={globalScore,riskLabel,riskClass,totalOk,totalWarn,totalAlert,totalQ,domainResults};

  // Afficher score board
  const board=document.getElementById('score-board');
  board.classList.add('show');
  document.getElementById('score-pct-val').textContent=globalScore+'%';
  document.getElementById('score-pct-val').style.color=globalScore>=75?'var(--ok)':globalScore>=50?'var(--gold)':'var(--red)';
  document.getElementById('score-risk-badge').innerHTML=`<span class="risk-badge ${riskClass}">${riskLabel}</span>`;

  // Score par domaine
  QCM_DOMAINS.forEach(d=>{
    const r=domainResults[d.id];
    const fill=document.getElementById('dsf-'+d.id);
    const val=document.getElementById('dsv-'+d.id);
    if(fill&&val){
      fill.style.width=r.score+'%';
      fill.style.background=r.score>=75?'var(--ok)':r.score>=50?'var(--gold)':'var(--red)';
      val.textContent=r.score+'%';
      val.style.color=r.score>=75?'var(--ok)':r.score>=50?'var(--gold)':'var(--red)';
    }
  });

  document.getElementById('result-3').textContent=`✓ Score global : ${globalScore}% — ${riskLabel} · ${totalOk} vert / ${totalWarn} orange / ${totalAlert} rouge`;
  validateStep(3);
  summaryActions.push(`💬 QCM Cyber : ${globalScore}% (${riskLabel})`);
}

/* ============================================================
   STEP ENGINE
   ============================================================ */
function validateStep(n){
  stepsValidated.add(n);
  const card=document.getElementById('step-'+n);
  if(card){card.classList.remove('active','locked');card.classList.add('done');}
  const r=document.getElementById('result-'+n);
  if(r) r.classList.add('show');
  if(n===2) summaryActions.push('🛠️ Analyse technique complétée');
  const next=document.getElementById('step-'+(n+1));
  if(next){next.classList.remove('locked');next.classList.add('active');}
  updateProgress();
  if(stepsValidated.size>=totalSteps) setTimeout(()=>showSummary(),400);
}

function updateProgress(){
  const pct=Math.round(stepsValidated.size/totalSteps*100);
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+' %';
  document.getElementById('progress-label').textContent=`${stepsValidated.size} étape${stepsValidated.size>1?'s':''} complétée${stepsValidated.size>1?'s':''}`;
}

function generateRapport(){
  const btn=document.getElementById('btn-rapport');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Génération…';
  loadJsPDF(()=>{
    try{
      buildRapportPDF();
      document.getElementById('result-4').textContent='✓ Rapport Cybersécurité PDF généré et téléchargé';
      validateStep(4);
      summaryActions.push('📊 Rapport Cyber PDF généré');
      showToast('Rapport téléchargé','ok');
    }catch(e){showToast('Erreur PDF : '+e.message,'err');console.error(e);}
    btn.disabled=false; btn.innerHTML='📊 Régénérer le rapport';
  });
}

function buildRapportPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const navy=[10,22,40],gold=[245,158,11],ok=[34,197,94],red=[239,68,68],warn=[245,158,11],mut=[100,116,139],cyber=[6,182,212];
  const today=new Date().toLocaleDateString('fr-FR');
  const formule=contract.formule||contract.type||'Audit de vulnérabilité';
  const sc=window._cyberScore||{globalScore:0,riskLabel:'Non évalué',totalOk:0,totalWarn:0,totalAlert:0,totalQ:0,domainResults:{}};

  /* === PAGE 1 — COUVERTURE === */
  doc.setFillColor(...navy); doc.rect(0,0,210,297,'F');
  doc.setFillColor(...cyber); doc.rect(0,0,210,4,'F');
  // Logo
  doc.setTextColor(...gold); doc.setFont('helvetica','bold'); doc.setFontSize(28); doc.text('S@FE',14,42);
  doc.setTextColor(255,255,255); doc.setFont('helvetica','normal'); doc.setFontSize(12); doc.text('Digitalisation',14,53);
  // Titre
  doc.setTextColor(...cyber); doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.text('RAPPORT DE CYBERSÉCURITÉ',14,90);
  doc.setTextColor(255,255,255); doc.setFontSize(12); doc.setFont('helvetica','normal'); doc.text(formule,14,102);
  doc.setDrawColor(...cyber); doc.setLineWidth(1); doc.line(14,108,110,108);
  // Client
  doc.setTextColor(180,200,225); doc.setFontSize(10); doc.text('CLIENT',14,122);
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(13);
  doc.text(contact.nom+(contact.entreprise?' — '+contact.entreprise:''),14,132);
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(150,175,210);
  if(contact.code_postal_ville) doc.text(contact.code_postal_ville,14,141);
  if(contact.siret) doc.text('SIRET : '+contact.siret,14,148);
  // Score global
  if(sc.totalQ>0){
    const sColor=sc.globalScore>=75?ok:sc.globalScore>=50?warn:red;
    doc.setFillColor(...sColor); doc.circle(170,120,24,'F');
    doc.setTextColor(10,22,40); doc.setFont('helvetica','bold'); doc.setFontSize(16);
    doc.text(sc.globalScore+'%',160,118);
    doc.setFontSize(7); doc.text(sc.riskLabel,154,126); doc.text('Maturité Cyber',154,133);
  }
  // Métadonnées
  doc.setTextColor(100,130,170); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('Établi le '+today+' · Référentiel ANSSI Guide Hygiène Informatique',14,260);
  doc.text('S@FE Digitalisation · SIRET 104 699 558 · www.safe-digitalisation.fr',14,267);
  doc.setFillColor(...cyber); doc.rect(0,293,210,4,'F');

  /* === PAGE 2 — INFOS CLIENT === */
  doc.addPage(); pdfH(doc,navy,gold,cyber);
  let y=52;
  y=sec(doc,'INFORMATIONS CLIENT & MISSION',y,navy,cyber);
  y=tbl(doc,[
    ['Client',contact.nom||'—'],['Entreprise',contact.entreprise||'—'],
    ['Email',contact.email||'—'],['Téléphone',contact.telephone||'—'],
    ['SIRET',contact.siret||'—'],['Adresse',(contact.adresse||'')+(contact.code_postal_ville?' — '+contact.code_postal_ville:'')],
    ['Formule',formule],['Montant',contract.montant?`${parseFloat(contract.montant).toLocaleString('fr-FR')} € HT`:'—'],
    ['Date d\'audit',today],['Référentiel','ANSSI Guide Hygiène Informatique — 42 règles'],
  ],y,navy,mut);

  /* === PAGE 3 — SCORES PAR DOMAINE === */
  if(sc.totalQ>0){
    doc.addPage(); pdfH(doc,navy,gold,cyber); y=52;
    y=sec(doc,'SCORES DE MATURITÉ PAR DOMAINE',y,navy,cyber);
    // Score global encadré
    const gc=sc.globalScore>=75?ok:sc.globalScore>=50?warn:red;
    doc.setFillColor(...gc); doc.rect(14,y,40,14,'F');
    doc.setTextColor(10,22,40); doc.setFont('helvetica','bold'); doc.setFontSize(13);
    doc.text(sc.globalScore+'%',20,y+9);
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(...navy);
    doc.text(sc.riskLabel,58,y+9);
    doc.setFontSize(8); doc.setTextColor(...mut);
    doc.text(`${sc.totalOk} conforme(s) · ${sc.totalWarn} à améliorer · ${sc.totalAlert} critique(s)`,58,y+15);
    y+=24;

    QCM_DOMAINS.forEach(d=>{
      const r=sc.domainResults[d.id];
      if(!r) return;
      if(y>265){doc.addPage();pdfH(doc,navy,gold,cyber);y=52;}
      const dc=r.score>=75?ok:r.score>=50?warn:red;
      // Barre de domaine
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...navy);
      doc.text(d.label,14,y);
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...dc);
      doc.text(r.score+'%',185,y,{align:'right'});
      y+=4;
      doc.setFillColor(30,45,70); doc.rect(14,y,182,6,'F');
      doc.setFillColor(...dc); doc.rect(14,y,182*r.score/100,6,'F');
      y+=10;
      // Détail des questions
      const ans=qcmAnswers[d.id]||{};
      d.questions.forEach(q=>{
        const a=ans[q.id];
        const qColor=!a?mut:a.risk==='ok'?ok:a.risk==='warn'?warn:red;
        doc.setFillColor(...qColor); doc.rect(16,y-3,2.5,5,'F');
        doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(45,60,85);
        doc.text(q.q,21,y,{maxWidth:140});
        if(a){
          doc.setFont('helvetica','italic'); doc.setTextColor(...qColor);
          doc.text('→ '+q.opts[a.idx].l,21,y+4.5,{maxWidth:140});
        }
        y+=11;
        if(y>270){doc.addPage();pdfH(doc,navy,gold,cyber);y=52;}
      });
      y+=3;
    });
  }

  /* === PAGE — ANALYSE TECHNIQUE === */
  const notesScans=document.getElementById('notes-scans')?.value||'';
  if(notesScans){
    doc.addPage(); pdfH(doc,navy,gold,cyber); y=52;
    y=sec(doc,'RÉSULTATS DE L\'ANALYSE TECHNIQUE',y,navy,cyber);
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(40,55,80);
    const lines=doc.splitTextToSize(notesScans,182);
    doc.text(lines,14,y); y+=lines.length*5+8;
  }

  /* === PAGE — RISQUES & RECOMMANDATIONS === */
  doc.addPage(); pdfH(doc,navy,gold,cyber); y=52;
  y=sec(doc,'RISQUES IDENTIFIÉS & RECOMMANDATIONS',y,navy,cyber);
  const recos=buildRecos(sc);
  recos.forEach(r=>{
    if(y>265){doc.addPage();pdfH(doc,navy,gold,cyber);y=52;}
    const rc=r.level==='CRITIQUE'?red:r.level==='ÉLEVÉ'?[249,115,22]:r.level==='MODÉRÉ'?warn:ok;
    doc.setFillColor(rc[0],rc[1],rc[2],0.1);
    doc.setFillColor(rc[0]<50?rc[0]+20:rc[0]-20,rc[1],rc[2]); // approx
    doc.setFillColor(...rc); doc.rect(14,y-4,3,9,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...rc);
    doc.text('['+r.level+']',19,y);
    doc.setFont('helvetica','normal'); doc.setTextColor(35,50,75);
    const rt=doc.splitTextToSize(r.text,150); doc.text(rt,50,y);
    y+=rt.length*4.5+5;
  });

  /* === PAGE — PLAN D'ACTION === */
  y+=6;
  if(y>240){doc.addPage();pdfH(doc,navy,gold,cyber);y=52;}
  y=sec(doc,'PLAN D\'ACTION PRIORISÉ',y,navy,cyber);
  const plan=buildPlanAction(sc,formule);
  ['Immédiat (0-7 jours)','Court terme (1-4 semaines)','Moyen terme (1-3 mois)'].forEach((horizon,hi)=>{
    const actions=plan.filter(p=>p.horizon===hi);
    if(!actions.length) return;
    if(y>255){doc.addPage();pdfH(doc,navy,gold,cyber);y=52;}
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...navy);
    doc.text(horizon,14,y); y+=6;
    actions.forEach(a=>{
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(40,55,80);
      doc.text('• '+a.action,16,y); y+=5.5;
    });
    y+=3;
  });

  /* === FOOTER DERNIÈRE PAGE === */
  pdfF(doc,navy,cyber,gold,today);
  doc.save(`SAFE_Cyber_${(contact.entreprise||contact.nom).replace(/\s+/g,'_')}_${today.replace(/\//g,'-')}.pdf`);
}

function buildRecos(sc){
  const recos=[];
  if(!sc||!sc.totalQ) return [{level:'INFO',text:'QCM non réalisé — analyse manuelle requise.'}];
  QCM_DOMAINS.forEach(d=>{
    const ans=qcmAnswers[d.id]||{};
    d.questions.forEach(q=>{
      const a=ans[q.id];
      if(!a) return;
      const map=RECOS_MAP[q.id];
      if(a.risk==='alert'&&map) recos.push({level:'CRITIQUE',text:map.alert});
      else if(a.risk==='warn'&&map) recos.push({level:'MODÉRÉ',text:map.warn});
    });
  });
  if(!recos.length) recos.push({level:'CONFORME',text:'Niveau de maturité cyber satisfaisant. Maintenir les bonnes pratiques et effectuer un audit annuel.'});
  return recos;
}

function buildPlanAction(sc,formule){
  const actions=[];
  if(!sc||!sc.totalQ) return [{horizon:0,action:'Planifier l\'audit de vulnérabilité complet'}];
  QCM_DOMAINS.forEach(d=>{
    const ans=qcmAnswers[d.id]||{};
    d.questions.forEach(q=>{
      const a=ans[q.id];
      if(!a) return;
      const map=RECOS_MAP[q.id];
      if(!map) return;
      if(a.risk==='alert') actions.push({horizon:0,action:map.alert});
      else if(a.risk==='warn') actions.push({horizon:1,action:map.warn});
    });
  });
  if(formule.includes('Résilience')||formule.includes('Essentiel')){
    actions.push({horizon:2,action:'Mise en place du tableau de bord de suivi cyber'});
    actions.push({horizon:2,action:'Formation des collaborateurs à la cybersécurité'});
  }
  return actions;
}

function sec(doc,title,y,navy,cyber){

function tbl(doc,rows,y,navy,mut){

}

function loadJsPDF(cb){
  if(window.jspdf){cb();return;}
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  s.onload=cb; document.head.appendChild(s);
}
function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+type;
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast',3200);
}
