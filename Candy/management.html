<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>C@NDY — Management de projet</title>
<link rel="icon" type="image/svg+xml" href="/Candy/favicon.svg">
  <link rel="shortcut icon" href="/Candy/favicon.svg">
  <link rel="apple-touch-icon" href="/Candy/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--rose:#F2D7D9;--rose-deep:#E8BFC2;--rose-light:#FBF0F1;--cerise:#C4717A;--cerise-2:#A85860;--blanc:#FEFAF9;--ardoise:#3D2B2D;--ardoise-2:#5C3F42;--mut:#8C6A6D;--sauge:#7A9E7E;--sauge-2:#5C7D60;--alert:#C0392B;--gold:#B8960C;--line:rgba(61,43,45,.1);--ff:'DM Serif Display',serif;--fb:'Inter',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--rose-light);color:var(--ardoise);-webkit-font-smoothing:antialiased;min-height:100vh}
/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--ardoise)}
.login-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:36px;width:340px}
.login-box h2{font-family:var(--ff);font-size:1.4rem;color:#fff;margin-bottom:6px}
.login-box p{font-size:.82rem;color:rgba(255,255,255,.5);margin-bottom:24px}
.login-box input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:10px 14px;color:#fff;font-family:var(--fb);font-size:.88rem;outline:none;margin-bottom:10px}
.login-box input::placeholder{color:rgba(255,255,255,.35)}
.btn-login{width:100%;background:var(--cerise);color:#fff;border:none;border-radius:8px;padding:11px;font-family:var(--fb);font-weight:600;font-size:.9rem;cursor:pointer;transition:background .2s}
.btn-login:hover{background:var(--cerise-2)}
.login-err{font-size:.78rem;color:#ff8a8a;margin-top:8px;display:none}
/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(254,250,249,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-brand{font-family:var(--ff);font-size:1.1rem;color:var(--ardoise);text-decoration:none}
.nav-brand span{color:var(--cerise)}
.nav-badge{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:var(--ardoise);color:#fff;padding:3px 8px;border-radius:999px;margin-left:6px}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-link{font-size:.8rem;color:var(--mut);text-decoration:none;font-weight:500}
.nav-link:hover{color:var(--cerise)}
/* LAYOUT */
.page{max-width:1100px;margin:0 auto;padding:32px 20px 80px}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.kpi{background:var(--blanc);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
.kpi-label{font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-bottom:8px}
.kpi-val{font-family:var(--ff);font-size:1.8rem;color:var(--ardoise);line-height:1}
.kpi-sub{font-size:.72rem;color:var(--mut);margin-top:4px}
.kpi-bar{height:4px;background:var(--rose-deep);border-radius:2px;margin-top:10px;overflow:hidden}
.kpi-bar-fill{height:4px;border-radius:2px;background:var(--cerise);transition:width .6s}
/* PHASES */
.phases{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.phase-card{background:var(--blanc);border:1px solid var(--line);border-radius:12px;padding:16px 18px;cursor:pointer;transition:box-shadow .2s}
.phase-card:hover{box-shadow:0 4px 16px rgba(61,43,45,.08)}
.phase-card.active-phase{border-color:var(--cerise)}
.phase-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.phase-num{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mut)}
.phase-badge{font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:999px}
.badge-done{background:rgba(122,158,126,.15);color:var(--sauge-2)}
.badge-wip{background:rgba(196,113,122,.12);color:var(--cerise-2)}
.badge-todo{background:rgba(61,43,45,.07);color:var(--mut)}
.badge-blocked{background:rgba(192,57,43,.1);color:var(--alert)}
.phase-title{font-family:var(--ff);font-size:.95rem;color:var(--ardoise);margin-bottom:6px}
.phase-bar{height:3px;background:var(--rose-deep);border-radius:2px;overflow:hidden}
.phase-bar-fill{height:3px;border-radius:2px;background:var(--cerise);transition:width .6s}
/* TACHES */
.tasks-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.tasks-header h2{font-family:var(--ff);font-size:1.2rem;color:var(--ardoise)}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{font-size:.75rem;font-weight:500;padding:5px 12px;border-radius:999px;border:1px solid var(--line);background:var(--blanc);color:var(--mut);cursor:pointer;transition:all .18s}
.filter-btn.active,.filter-btn:hover{border-color:var(--cerise);color:var(--cerise);background:rgba(196,113,122,.06)}
.btn-add{background:var(--cerise);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:var(--fb);font-weight:600;font-size:.82rem;cursor:pointer;transition:background .2s}
.btn-add:hover{background:var(--cerise-2)}
/* TASK LIST */
.task-list{display:flex;flex-direction:column;gap:6px}
.task-item{background:var(--blanc);border:1px solid var(--line);border-radius:10px;padding:14px 16px;display:grid;grid-template-columns:24px 1fr auto;gap:12px;align-items:center;transition:box-shadow .15s}
.task-item:hover{box-shadow:0 2px 8px rgba(61,43,45,.06)}
.task-item.done{opacity:.6}
.task-item.done .task-title{text-decoration:line-through}
.task-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.task-check.checked{background:var(--sauge);border-color:var(--sauge)}
.task-check.checked::after{content:'✓';font-size:.65rem;color:#fff}
.task-check.wip{border-color:var(--cerise)}
.task-check.blocked{border-color:var(--alert)}
.task-title{font-size:.88rem;font-weight:500;color:var(--ardoise)}
.task-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:3px}
.task-phase{font-size:.68rem;color:var(--mut)}
.task-deadline{font-size:.68rem;color:var(--mut)}
.task-deadline.late{color:var(--alert);font-weight:600}
.task-prio{font-size:.65rem;padding:1px 6px;border-radius:999px;font-weight:600}
.prio-haute{background:rgba(192,57,43,.1);color:var(--alert)}
.prio-moyenne{background:rgba(184,150,12,.1);color:var(--gold)}
.prio-basse{background:rgba(122,158,126,.1);color:var(--sauge-2)}
.task-actions{display:flex;gap:6px}
.task-btn{font-size:.72rem;padding:4px 10px;border-radius:6px;border:1px solid var(--line);background:none;color:var(--mut);cursor:pointer;transition:all .18s}
.task-btn:hover{border-color:var(--cerise);color:var(--cerise)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(61,43,45,.35);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--blanc);border-radius:16px;padding:28px;width:100%;max-width:480px}
.modal-box h3{font-family:var(--ff);font-size:1.2rem;color:var(--ardoise);margin-bottom:20px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mut)}
.field input,.field select,.field textarea{background:var(--rose-light);border:1px solid var(--line);border-radius:8px;padding:9px 12px;color:var(--ardoise);font-family:var(--fb);font-size:.87rem;outline:none;width:100%;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cerise)}
.field select option{background:var(--blanc)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-cancel{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:8px 16px;font-family:var(--fb);font-weight:500;font-size:.85rem;cursor:pointer}
.btn-save{background:var(--cerise);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:var(--fb);font-weight:600;font-size:.85rem;cursor:pointer}
/* NOTES */
.notes-section{background:var(--blanc);border:1px solid var(--line);border-radius:12px;padding:20px;margin-top:24px}
.notes-section h3{font-family:var(--ff);font-size:1rem;color:var(--ardoise);margin-bottom:12px}
.notes-area{width:100%;background:var(--rose-light);border:1px solid var(--line);border-radius:8px;padding:12px;font-family:var(--fb);font-size:.85rem;color:var(--ardoise);resize:vertical;min-height:120px;outline:none;line-height:1.6}
.notes-area:focus{border-color:var(--cerise)}
.notes-saved{font-size:.72rem;color:var(--sauge-2);margin-top:6px;display:none}
@media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.phases{grid-template-columns:1fr}.task-item{grid-template-columns:24px 1fr}.task-actions{display:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>C@NDY — Accès restreint</h2>
    <p>Espace administrateur S@FE uniquement</p>
    <input id="l-email" type="email" placeholder="Email administrateur" autocomplete="email">
    <input id="l-pass" type="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="btn-login" onclick="doLogin()">Se connecter</button>
    <div class="login-err" id="l-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
<nav>
  <a href="/Candy/index.html" class="nav-brand">C<span>@</span>NDY<span class="nav-badge">Admin</span></a>
  <div class="nav-right">
    <a href="/Candy/index.html" class="nav-link">← Vitrine</a>
    <a href="/Candy/patients.html" class="nav-link">Démo</a>
    <a href="/index.html" class="nav-link">CRM S@FE</a>
    <button onclick="doLogout()" style="font-size:.78rem;color:var(--mut);background:none;border:1px solid var(--line);border-radius:6px;padding:5px 10px;cursor:pointer">Déconnexion</button>
  </div>
</nav>

<div class="page">
  <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px">
    <div>
      <h1 style="font-family:var(--ff);font-size:1.7rem;color:var(--ardoise)">Management de projet C@NDY</h1>
      <p style="font-size:.85rem;color:var(--mut);margin-top:4px">Suivi du développement — logiciel médical on-premise multi-praticiens</p>
    </div>
    <div style="font-size:.75rem;color:var(--mut)" id="last-update"></div>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" id="kpi-grid"></div>

  <!-- PHASES -->
  <h2 style="font-family:var(--ff);font-size:1.1rem;color:var(--ardoise);margin-bottom:12px">Phases du projet</h2>
  <div class="phases" id="phases-grid"></div>

  <!-- TACHES -->
  <div class="tasks-header">
    <h2>Tâches</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <div class="filters" id="filters"></div>
      <button class="btn-add" onclick="openModal()">+ Nouvelle tâche</button>
    </div>
  </div>
  <div class="task-list" id="task-list"></div>

  <!-- NOTES -->
  <div class="notes-section">
    <h3>Notes & décisions clés</h3>
    <textarea class="notes-area" id="notes-area" placeholder="Notez ici les décisions importantes, blocages, idées…" oninput="saveNotes()"></textarea>
    <div class="notes-saved" id="notes-saved">Sauvegardé ✓</div>
  </div>
</div>
</div>

<!-- MODAL TACHE -->
<div class="modal-overlay" id="task-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <h3 id="modal-title">Nouvelle tâche</h3>
    <div class="field"><label>Titre *</label><input id="t-titre" type="text" placeholder="Description de la tâche"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field"><label>Phase</label>
        <select id="t-phase">
          <option value="1">1 — Démo statique</option>
          <option value="2">2 — Architecture</option>
          <option value="3">3 — Développement MVP</option>
          <option value="4">4 — Intégration B2Brouter</option>
          <option value="5">5 — Certification HDS</option>
          <option value="6">6 — Pilote cabinet</option>
          <option value="7">7 — Commercialisation</option>
        </select>
      </div>
      <div class="field"><label>Priorité</label>
        <select id="t-prio">
          <option value="Haute">Haute</option>
          <option value="Moyenne" selected>Moyenne</option>
          <option value="Basse">Basse</option>
        </select>
      </div>
      <div class="field"><label>Statut</label>
        <select id="t-statut">
          <option value="todo">À faire</option>
          <option value="wip">En cours</option>
          <option value="done">Terminé</option>
          <option value="blocked">Bloqué</option>
        </select>
      </div>
      <div class="field"><label>Deadline</label><input id="t-deadline" type="date"></div>
    </div>
    <div class="field"><label>Notes</label><textarea id="t-notes" style="min-height:70px" placeholder="Détails, liens, contexte…"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveTask()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://qdjmzietysukediqkebg.supabase.co";
const SUPABASE_KEY = "sb_publishable_8uD3m60n9GfMt2h_GkmB7w_MpdFN5_s";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const STORAGE_KEY = 'candy_pm';
const NOTES_KEY   = 'candy_pm_notes';

const PHASES = [
  {id:1, label:'Démo statique',        status:'done',    desc:'Interface HTML/CSS demo'},
  {id:2, label:'Architecture technique',status:'wip',     desc:'Stack, HDS, VPN, schémas'},
  {id:3, label:'Développement MVP',     status:'todo',    desc:'Auth, dossier, agenda, ordonnances'},
  {id:4, label:'Intégration B2Brouter', status:'todo',    desc:'Facturation électronique auto'},
  {id:5, label:'Certification HDS',     status:'todo',    desc:'Audit, hébergeur, conformité'},
  {id:6, label:'Pilote cabinet',        status:'todo',    desc:'1 cabinet test — retours terrain'},
  {id:7, label:'Commercialisation',     status:'todo',    desc:'Tarifs, contrats, déploiement'},
];

const DEFAULT_TASKS = [
  {id:'t1',titre:'Créer la page vitrine C@NDY',phase:1,prio:'Haute',statut:'done',deadline:'2026-06-10',notes:''},
  {id:'t2',titre:'Intégrer le schéma d\'architecture on-premise',phase:2,prio:'Haute',statut:'done',deadline:'2026-06-17',notes:''},
  {id:'t3',titre:'Choisir l\'hébergeur HDS (OVHcloud ou Outscale)',phase:2,prio:'Haute',statut:'wip',deadline:'2026-07-15',notes:'Comparer OVHcloud HDS et Outscale SecNumCloud. Budget : 50-100€/mois.'},
  {id:'t4',titre:'Définir la stack technique complète (Node.js + PostgreSQL)',phase:2,prio:'Haute',statut:'wip',deadline:'2026-07-30',notes:''},
  {id:'t5',titre:'Concevoir le schéma de base de données patients',phase:3,prio:'Haute',statut:'todo',deadline:'2026-08-15',notes:''},
  {id:'t6',titre:'Développer l\'authentification multi-praticiens',phase:3,prio:'Haute',statut:'todo',deadline:'2026-08-30',notes:'Sessions par praticien, rôles admin/secrétaire/médecin'},
  {id:'t7',titre:'Module dossier patient (création, consultation, modification)',phase:3,prio:'Haute',statut:'todo',deadline:'2026-09-15',notes:''},
  {id:'t8',titre:'Module agenda multi-praticiens',phase:3,prio:'Moyenne',statut:'todo',deadline:'2026-09-30',notes:'Vue jour/semaine, créneaux, rappels'},
  {id:'t9',titre:'Module ordonnances (rédaction + impression)',phase:3,prio:'Moyenne',statut:'todo',deadline:'2026-10-15',notes:''},
  {id:'t10',titre:'Chiffrement AES-256 de la base PostgreSQL',phase:3,prio:'Haute',statut:'todo',deadline:'2026-09-15',notes:''},
  {id:'t11',titre:'Configurer VPN WireGuard pour accès distant',phase:3,prio:'Haute',statut:'todo',deadline:'2026-09-30',notes:''},
  {id:'t12',titre:'Intégrer l\'API B2Brouter pour facturation électronique',phase:4,prio:'Haute',statut:'todo',deadline:'2026-10-31',notes:'Phase pilote B2Brouter gratuite jusqu\'au 31/08/2026'},
  {id:'t13',titre:'Générer automatiquement les Factur-X à la consultation',phase:4,prio:'Moyenne',statut:'todo',deadline:'2026-11-15',notes:''},
  {id:'t14',titre:'Sélectionner et contractualiser avec hébergeur HDS certifié',phase:5,prio:'Haute',statut:'todo',deadline:'2026-11-30',notes:''},
  {id:'t15',titre:'Audit de sécurité & tests de conformité HDS',phase:5,prio:'Haute',statut:'todo',deadline:'2026-12-31',notes:''},
  {id:'t16',titre:'Recruter cabinet pilote test',phase:6,prio:'Haute',statut:'todo',deadline:'2027-01-31',notes:'Médecin généraliste 1-3 praticiens, Auvergne-Rhône-Alpes'},
  {id:'t17',titre:'Installation et formation cabinet pilote',phase:6,prio:'Haute',statut:'todo',deadline:'2027-02-28',notes:''},
  {id:'t18',titre:'Recueil des retours terrain — itérations',phase:6,prio:'Haute',statut:'todo',deadline:'2027-04-30',notes:''},
  {id:'t19',titre:'Définir la grille tarifaire finale',phase:7,prio:'Haute',statut:'todo',deadline:'2027-05-31',notes:''},
  {id:'t20',titre:'Lancer la commercialisation — 1ers cabinets clients',phase:7,prio:'Haute',statut:'todo',deadline:'2027-09-01',notes:'Obligation HDS septembre 2027 = levier commercial'},
];

let tasks = [], filterPhase = 0, filterStatus = 'all', editId = null;

// ── AUTH ──
async function doLogin(){
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const errEl = document.getElementById('l-err');
  errEl.style.display = 'none';
  if(!email||!pass){errEl.textContent='Renseignez email et mot de passe.';errEl.style.display='block';return;}
  const {data,error} = await sb.auth.signInWithPassword({email,password:pass});
  if(error){errEl.textContent='Identifiants incorrects.';errEl.style.display='block';return;}
  // Vérifier is_admin
  const {data:profile} = await sb.from('profiles').select('is_admin').eq('id',data.user.id).single();
  if(!profile?.is_admin){
    await sb.auth.signOut();
    errEl.textContent='Accès réservé aux administrateurs S@FE.';errEl.style.display='block';return;
  }
  showApp();
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  loadData();
  loadNotes();
  document.getElementById('last-update').textContent='Dernière mise à jour : '+new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
}

// ── DATA ──
function loadData(){
  const saved = localStorage.getItem(STORAGE_KEY);
  tasks = saved ? JSON.parse(saved) : DEFAULT_TASKS;
  render();
}

function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function loadNotes(){
  document.getElementById('notes-area').value = localStorage.getItem(NOTES_KEY)||'';
}

let notesTimer;
function saveNotes(){
  clearTimeout(notesTimer);
  notesTimer = setTimeout(()=>{
    localStorage.setItem(NOTES_KEY, document.getElementById('notes-area').value);
    const s = document.getElementById('notes-saved');
    s.style.display='block';
    setTimeout(()=>s.style.display='none',2000);
  },600);
}

// ── RENDER ──
function render(){
  renderKPIs();
  renderPhases();
  renderFilters();
  renderTasks();
}

function renderKPIs(){
  const total   = tasks.length;
  const done    = tasks.filter(t=>t.statut==='done').length;
  const wip     = tasks.filter(t=>t.statut==='wip').length;
  const blocked = tasks.filter(t=>t.statut==='blocked').length;
  const pct     = Math.round(done/total*100);

  const today = new Date().toISOString().slice(0,10);
  const late  = tasks.filter(t=>t.deadline && t.deadline<today && t.statut!=='done').length;

  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Avancement global</div>
      <div class="kpi-val">${pct}%</div>
      <div class="kpi-sub">${done} tâches sur ${total}</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">En cours</div>
      <div class="kpi-val" style="color:var(--cerise)">${wip}</div>
      <div class="kpi-sub">tâches actives</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Bloquées / en retard</div>
      <div class="kpi-val" style="color:${blocked+late>0?'var(--alert)':'var(--sauge)'}">${blocked+late}</div>
      <div class="kpi-sub">${blocked} bloquées · ${late} en retard</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Phase actuelle</div>
      <div class="kpi-val" style="font-size:1.2rem;color:var(--cerise-2)">${getCurrentPhaseLabel()}</div>
      <div class="kpi-sub">en cours de réalisation</div>
    </div>`;
}

function getCurrentPhaseLabel(){
  const wipPhases = [...new Set(tasks.filter(t=>t.statut==='wip').map(t=>t.phase))];
  if(wipPhases.length) return 'Phase '+Math.min(...wipPhases);
  const todoPhases = [...new Set(tasks.filter(t=>t.statut==='todo').map(t=>t.phase))];
  if(todoPhases.length) return 'Phase '+Math.min(...todoPhases);
  return 'Terminé';
}

function renderPhases(){
  const grid = document.getElementById('phases-grid');
  grid.innerHTML = PHASES.map(p=>{
    const pTasks = tasks.filter(t=>t.phase===p.id);
    const pDone  = pTasks.filter(t=>t.statut==='done').length;
    const pPct   = pTasks.length ? Math.round(pDone/pTasks.length*100) : 0;
    const hasWip = pTasks.some(t=>t.statut==='wip');
    const hasBlk = pTasks.some(t=>t.statut==='blocked');
    const allDone= pTasks.length>0 && pTasks.every(t=>t.statut==='done');
    const badge  = allDone ? '<span class="phase-badge badge-done">Terminé</span>' :
                   hasBlk  ? '<span class="phase-badge badge-blocked">Bloqué</span>' :
                   hasWip  ? '<span class="phase-badge badge-wip">En cours</span>' :
                              '<span class="phase-badge badge-todo">À venir</span>';
    return `<div class="phase-card ${filterPhase===p.id?'active-phase':''}" onclick="setPhaseFilter(${p.id})">
      <div class="phase-head">
        <span class="phase-num">Phase ${p.id}</span>${badge}
      </div>
      <div class="phase-title">${p.label}</div>
      <div style="font-size:.72rem;color:var(--mut);margin-bottom:8px">${p.desc}</div>
      <div class="phase-bar"><div class="phase-bar-fill" style="width:${pPct}%"></div></div>
      <div style="font-size:.7rem;color:var(--mut);margin-top:4px">${pDone}/${pTasks.length} tâches · ${pPct}%</div>
    </div>`;
  }).join('');
}

function setPhaseFilter(id){
  filterPhase = filterPhase===id ? 0 : id;
  render();
}

function renderFilters(){
  const statuses = [
    {v:'all',l:'Toutes'},
    {v:'todo',l:'À faire'},
    {v:'wip',l:'En cours'},
    {v:'done',l:'Terminées'},
    {v:'blocked',l:'Bloquées'},
  ];
  document.getElementById('filters').innerHTML = statuses.map(s=>
    `<button class="filter-btn ${filterStatus===s.v?'active':''}" onclick="setStatusFilter('${s.v}')">${s.l}</button>`
  ).join('');
}

function setStatusFilter(v){filterStatus=v;render();}

function renderTasks(){
  const today = new Date().toISOString().slice(0,10);
  let filtered = tasks;
  if(filterPhase)     filtered = filtered.filter(t=>t.phase===filterPhase);
  if(filterStatus!=='all') filtered = filtered.filter(t=>t.statut===filterStatus);
  filtered = [...filtered].sort((a,b)=>{
    const so = {blocked:0,wip:1,todo:2,done:3};
    return (so[a.statut]||2)-(so[b.statut]||2);
  });

  const list = document.getElementById('task-list');
  if(!filtered.length){
    list.innerHTML='<div style="text-align:center;padding:32px;color:var(--mut);font-size:.85rem">Aucune tâche correspondante.</div>';
    return;
  }
  list.innerHTML = filtered.map(t=>{
    const late = t.deadline && t.deadline<today && t.statut!=='done';
    const checkCls = t.statut==='done'?'checked':t.statut==='wip'?'wip':t.statut==='blocked'?'blocked':'';
    const prioCls  = t.prio==='Haute'?'prio-haute':t.prio==='Moyenne'?'prio-moyenne':'prio-basse';
    const phLabel  = PHASES.find(p=>p.id===t.phase)?.label||'';
    return `<div class="task-item ${t.statut==='done'?'done':''}">
      <div class="task-check ${checkCls}" onclick="cycleStatus('${t.id}')"></div>
      <div>
        <div class="task-title">${escHtml(t.titre)}</div>
        <div class="task-meta">
          <span class="task-phase">Phase ${t.phase} — ${escHtml(phLabel)}</span>
          ${t.deadline?`<span class="task-deadline ${late?'late':''}">${late?'⚠ ':''}${formatDate(t.deadline)}</span>`:''}
          <span class="task-prio ${prioCls}">${t.prio}</span>
          ${t.notes?`<span style="font-size:.68rem;color:var(--mut)" title="${escHtml(t.notes)}">📝</span>`:''}
        </div>
      </div>
      <div class="task-actions">
        <button class="task-btn" onclick="openModal('${t.id}')">Éditer</button>
        <button class="task-btn" onclick="deleteTask('${t.id}')" style="color:var(--alert)">✕</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatDate(d){if(!d)return'';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}

// ── TASK ACTIONS ──
function cycleStatus(id){
  const order=['todo','wip','done','blocked'];
  const t = tasks.find(x=>x.id===id);
  if(!t)return;
  const i = order.indexOf(t.statut);
  t.statut = order[(i+1)%order.length];
  saveData(); render();
}

function deleteTask(id){
  if(!confirm('Supprimer cette tâche ?'))return;
  tasks = tasks.filter(t=>t.id!==id);
  saveData(); render();
}

// ── MODAL ──
function openModal(id=null){
  editId = id;
  document.getElementById('modal-title').textContent = id ? 'Modifier la tâche' : 'Nouvelle tâche';
  if(id){
    const t = tasks.find(x=>x.id===id);
    document.getElementById('t-titre').value   = t.titre;
    document.getElementById('t-phase').value   = t.phase;
    document.getElementById('t-prio').value    = t.prio;
    document.getElementById('t-statut').value  = t.statut;
    document.getElementById('t-deadline').value= t.deadline||'';
    document.getElementById('t-notes').value   = t.notes||'';
  } else {
    document.getElementById('t-titre').value='';
    document.getElementById('t-phase').value='2';
    document.getElementById('t-prio').value='Moyenne';
    document.getElementById('t-statut').value='todo';
    document.getElementById('t-deadline').value='';
    document.getElementById('t-notes').value='';
  }
  document.getElementById('task-modal').classList.add('show');
  document.getElementById('t-titre').focus();
}

function closeModal(){document.getElementById('task-modal').classList.remove('show');editId=null;}

function saveTask(){
  const titre = document.getElementById('t-titre').value.trim();
  if(!titre){alert('Le titre est obligatoire.');return;}
  if(editId){
    const t = tasks.find(x=>x.id===editId);
    t.titre=titre;t.phase=parseInt(document.getElementById('t-phase').value);
    t.prio=document.getElementById('t-prio').value;t.statut=document.getElementById('t-statut').value;
    t.deadline=document.getElementById('t-deadline').value;t.notes=document.getElementById('t-notes').value;
  } else {
    tasks.push({
      id:'t'+Date.now(),titre,
      phase:parseInt(document.getElementById('t-phase').value),
      prio:document.getElementById('t-prio').value,
      statut:document.getElementById('t-statut').value,
      deadline:document.getElementById('t-deadline').value,
      notes:document.getElementById('t-notes').value
    });
  }
  saveData(); render(); closeModal();
}

// ── INIT ──
(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(session){
    const {data:profile} = await sb.from('profiles').select('is_admin').eq('id',session.user.id).single();
    if(profile?.is_admin) showApp(); else document.getElementById('login-screen').style.display='flex';
  }
})();
</script>
</body>
</html>
